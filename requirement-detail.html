<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requirement Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-card">
            <a href="scout-dashboard.html" style="display: inline-block; margin-bottom: 16px; color: #8baa9a; text-decoration: none;">← Back to Dashboard</a>
            <h1 id="req-title">Loading...</h1>
            <div class="subtitle">Study notes and requirements</div>
        </div>

        <div class="progress-card" id="notes-content">
            <p>Loading notes...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reqName = urlParams.get('name');
        const tab = urlParams.get('tab') || 'membership';

        const notesData = {
            membership: {
                "Law and Promise": {
                    title: "Law and Promise",
                    content: `
                        <h3>📖 What to learn:</h3>
                        <p>Write the Scout Law and Promise clearly in your Logbook. Understand what each point means.</p>
                        <h3>🗣️ Discussion points:</h3>
                        <ul>
                            <li>What does "A Scout is trustworthy" mean in daily life?</li>
                            <li>How can you practice the Scout Promise at school and at home?</li>
                            <li>Talk with your leader about how Scouting has changed you.</li>
                        </ul>
                        <h3>✅ To pass:</h3>
                        <p>Discuss with your leader how you live by the Promise every day.</p>
                    `
                },
                "Knots and Whipping": {
                    title: "Knots and Whipping",
                    content: `
                        <h3>🪢 Knots you need to know:</h3>
                        <ul>
                            <li><strong>Reef Knot</strong> - for joining two ropes of equal thickness</li>
                            <li><strong>Sheet Bend</strong> - for joining ropes of different thickness</li>
                            <li><strong>Clove Hitch</strong> - for starting lashings</li>
                            <li><strong>Bowline</strong> - for making a fixed loop</li>
                            <li><strong>Round Turn and Two Half Hitches</strong> - for tying to a post</li>
                            <li><strong>Sheep Shank</strong> - for shortening a rope</li>
                        </ul>
                        <h3>📝 Practice:</h3>
                        <p>Practice each knot until you can tie it blindfolded. Demonstrate all six to your leader.</p>
                        <h3>🔧 Whipping:</h3>
                        <p>Learn to whip the end of a rope to prevent fraying.</p>
                    `
                },
                "Woodcraft Signs": {
                    title: "Woodcraft Signs",
                    content: `<p>📝 Notes for Woodcraft Signs coming soon.</p>`
                },
                "National Flag, Anthem, Emblem, Tree, Flower": {
                    title: "National Flag, Anthem, Emblem, Tree, Flower",
                    content: `<p>📝 Notes for National Flag coming soon.</p>`
                },
                "Scouting History": {
                    title: "Scouting History",
                    content: `<p>📝 Notes for Scouting History coming soon.</p>`
                },
                "Salutes, Signs, Handshake, Scout Staff": {
                    title: "Salutes, Signs, Handshake, Scout Staff",
                    content: `<p>📝 Notes for Salutes coming soon.</p>`
                },
                "Dress a Wound": {
                    title: "Dress a Wound",
                    content: `<p>📝 Notes for First Aid coming soon.</p>`
                },
                "Whistle Calls, Silent Signs, Formations": {
                    title: "Whistle Calls, Silent Signs, Formations",
                    content: `<p>📝 Notes for Whistle Calls coming soon.</p>`
                },
                "Re-test Membership": {
                    title: "Re-test Membership",
                    content: `<p>📝 Notes for Re-test coming soon.</p>`
                },
                "Interview by Scouter": {
                    title: "Interview by Scouter",
                    content: `<p>📝 Notes for Interview coming soon.</p>`
                },
                "Investiture": {
                    title: "Investiture",
                    content: `<p>📝 Notes for Investiture coming soon.</p>`
                }
            }
        };

        function getNotes(tab, name) {
            if (notesData[tab] && notesData[tab][name]) {
                return notesData[tab][name];
            }
            return {
                title: name,
                content: `<p>📝 Notes for "${name}" coming soon. Ask your leader for guidance.</p>`
            };
        }

        const notes = getNotes(tab, reqName);
        document.getElementById('req-title').innerText = notes.title;
        document.getElementById('notes-content').innerHTML = notes.content;
    </script>
</body>
</html>
