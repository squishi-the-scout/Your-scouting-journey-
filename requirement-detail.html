 Villingili, 1992</li><li>5th: Kaafu Villingili, 1995</li><li>6th: Kuda Bandos, 1998</li><li>7th: Male Artificial Beach, 2002</li><li>8th (Golden Jubilee): Hulhumale, 2007</li></ul>`
