<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏕️ Badge Camp — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ─── RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #2d3a2d;
            min-height: 100vh;
            padding: 20px;
            color: #e8e0e0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header .back-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #e8e0e0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f5e6c8;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header h1 span {
            color: #e8c48a;
        }

        /* ─── GAME SCENE ─── */
        .game-scene {
            background: linear-gradient(180deg, #4a7a5a 0%, #3a6a4a 40%, #2d5a3d 70%, #1a3a2a 100%);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }

        /* ─── FOREST DECORATIONS ─── */
        .forest-trees {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            pointer-events: none;
            overflow: hidden;
        }

        .forest-trees .tree {
            position: absolute;
            bottom: 0;
        }

        .forest-trees .tree svg {
            width: 100%;
            height: 100%;
        }

        /* ─── CHARACTER + STATS ROW ─── */
        .character-row {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .character-wrapper {
            flex-shrink: 0;
            position: relative;
        }

        .character-wrapper .pixel-scout {
            width: 100px;
            height: 130px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
            image-rendering: pixelated;
        }

        /* ─── CHARACTER STATS ─── */
        .character-stats {
            flex: 1;
            min-width: 150px;
        }

        .character-stats .name {
            font-size: 24px;
            font-weight: 700;
            color: #f5e6c8;
            margin-bottom: 2px;
        }

        .character-stats .title {
            font-size: 14px;
            color: #c8b89a;
            margin-bottom: 8px;
        }

        .character-stats .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 300px;
        }

        .character-stats .stat {
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 8px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .character-stats .stat .number {
            font-size: 20px;
            font-weight: 700;
            color: #f5e6c8;
        }

        .character-stats .stat .label {
            font-size: 10px;
            color: #a8b8a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ─── PROGRESS BAR ─── */
        .progress-section {
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
            z-index: 1;
        }

        .progress-section .label {
            font-size: 13px;
            color: #c8b89a;
            white-space: nowrap;
        }

        .progress-section .label strong {
            color: #f5e6c8;
        }

        .progress-section .bar-wrap {
            flex: 1;
            min-width: 100px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-section .bar-wrap .fill {
            height: 100%;
            background: linear-gradient(90deg, #6c3b8c, #e67e22);
            border-radius: 20px;
            transition: width 0.8s ease;
            width: 0%;
        }

        .progress-section .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: #f5e6c8;
            min-width: 45px;
            text-align: right;
        }

        /* ─── INVENTORY TITLE ─── */
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .inventory-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #f5e6c8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .inventory-header h2 .pocket-icon svg {
            width: 24px;
            height: 24px;
        }

        .inventory-header .slot-count {
            font-size: 13px;
            color: #a8b8a8;
        }

        /* ─── INVENTORY GRID ─── */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .inventory-slot {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            padding: 8px;
            min-height: 90px;
        }

        .inventory-slot:hover {
            transform: scale(1.04);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
        }

        .inventory-slot .badge-icon {
            font-size: 28px;
            line-height: 1;
            margin-bottom: 2px;
        }

        .inventory-slot .badge-name {
            font-size: 9px;
            color: #a8b8a8;
            text-align: center;
            line-height: 1.1;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── EARNED SLOT ─── */
        .inventory-slot.earned {
            border-color: #6c3b8c;
            background: rgba(108, 59, 140, 0.15);
            box-shadow: 0 0 20px rgba(108, 59, 140, 0.15);
        }

        .inventory-slot.earned .badge-name {
            color: #e8d0f0;
        }

        .inventory-slot.earned .earned-check {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 12px;
            color: #8fbcbb;
        }

        /* ─── LOCKED SLOT ─── */
        .inventory-slot.locked {
            opacity: 0.5;
            filter: grayscale(0.6);
        }

        .inventory-slot.locked .lock-icon {
            font-size: 24px;
            opacity: 0.6;
        }

        .inventory-slot.locked .badge-name {
            color: #6a7a6a;
        }

        .inventory-slot.locked .coming-soon {
            font-size: 8px;
            color: #5a6a5a;
            margin-top: 2px;
        }

        /* ─── EMPTY SLOT ─── */
        .inventory-slot.empty {
            border-style: dashed;
            border-color: rgba(255,255,255,0.06);
        }

        .inventory-slot.empty .empty-icon {
            font-size: 20px;
            opacity: 0.2;
        }

        /* ─── TOOLTIP ─── */
        .tooltip {
            display: none;
            position: fixed;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 16px;
            padding: 16px 20px;
            max-width: 240px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .tooltip.visible {
            display: block;
        }

        .tooltip .tooltip-name {
            font-size: 16px;
            font-weight: 600;
            color: #f5e6c8;
            margin-bottom: 4px;
        }

        .tooltip .tooltip-category {
            font-size: 11px;
            color: #a8b8a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tooltip .tooltip-status {
            font-size: 12px;
            margin-top: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        .tooltip .tooltip-status.earned {
            background: rgba(108, 59, 140, 0.3);
            color: #e8d0f0;
        }

        .tooltip .tooltip-status.locked {
            background: rgba(255,255,255,0.05);
            color: #6a7a6a;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .game-scene {
                padding: 16px;
                border-radius: 20px;
            }

            .character-row {
                gap: 16px;
            }

            .character-wrapper .pixel-scout {
                width: 70px;
                height: 90px;
            }

            .character-stats .name {
                font-size: 18px;
            }

            .character-stats .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 100%;
            }

            .character-stats .stat .number {
                font-size: 16px;
            }

            .inventory-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            .inventory-slot {
                min-height: 70px;
                padding: 6px;
                border-radius: 12px;
            }

            .inventory-slot .badge-icon {
                font-size: 22px;
            }

            .inventory-slot .badge-name {
                font-size: 8px;
            }

            .progress-section {
                flex-wrap: wrap;
                gap: 8px;
                padding: 10px 14px;
            }

            .progress-section .label {
                font-size: 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .inventory-header h2 {
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .inventory-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .character-stats .stats-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>

        <!-- ─── HEADER ─── -->

            { id: 'scouting_history', name: 'Scouting History', category: 'national', icon: '📜' },
            { id: 'sea_safety', name: 'Sea Safety', category: 'national', icon: '⚓' },
            { id: 'marine_conservation', name: 'Marine Conservation', category: 'national', icon: '🐠' },
            { id: 'fundraiser', name: 'Fundraiser', category: 'national', icon: '🎗️' },
            { id: 'community_service', name: 'Community Service', category: 'national', icon: '🤲' },
            { id: 'eid_ramadan', name: 'Eid / Ramadan', category: 'national', icon: '🌙' },
            { id: 'national_day', name: 'National Day', category: 'national', icon: '🇲🇻' },

            // ─── International Badges ───
            { id: 'jota_joti', name: 'Jota Joti', category: 'international', icon: '📡' },
            { id: 'world_jamboree', name: 'World Jamboree', category: 'international', icon: '🌍' },
            { id: 'asia_pacific', name: 'Asia-Pacific Event', category: 'international', icon: '🌏' },
            { id: 'world_scouting_day', name: 'World Scouting Day', category: 'international', icon: '🗓️' },
            { id: 'peace_badge', name: 'Peace Badge', category: 'international', icon: '🕊️' },
            { id: 'friendship', name: 'International Friendship', category: 'international', icon: '🤝' },

            // ─── Special Badges ───
            { id: 'leadership', name: 'Leadership', category: 'special', icon: '👑' },
            { id: 'service', name: 'Service', category: 'special', icon: '💚' },
            { id: 'spirit_scouting', name: 'Spirit of Scouting', category: 'special', icon: '🌟' },
            { id: 'outstanding', name: 'Outstanding Achievement', category: 'special', icon: '⭐' },
            { id: 'helper', name: 'Helper', category: 'special', icon: '🤗' },
        ];

        // ─── FETCH BADGE STATUS ──────────────────────────────
        async function fetchBadgeStatus() {
            try {
                const docRef = doc(db, 'users', userDocId);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    return data.badges || {};
                }
                return {};
            } catch (error) {
                console.error('Error fetching badges:', error);
                return {};
            }
        }

        // ─── RENDER INVENTORY ──────────────────────────────────
        async function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            const badgeStatus = await fetchBadgeStatus();

            // Count earned badges
            let earnedCount = 0;
            const totalBadges = badges.length;

            // Update scout name
            document.getElementById('scout-name').textContent = currentUser.fullName || currentUser.username;

            let html = '';

            // ─── Render each badge ───
            for (const badge of badges) {
                const isEarned = badgeStatus[badge.id]?.earned === true;
                const isPending = badgeStatus[badge.id]?.status === 'pending';
                const status = isEarned ? 'earned' : (isPending ? 'pending' : 'locked');

                if (isEarned) earnedCount++;

                // Determine slot class
                let slotClass = 'inventory-slot';
                if (isEarned) slotClass += ' earned';
                else if (isPending) slotClass += ' pending';
                else slotClass += ' locked';

                // Build slot content
                let content = '';
                if (isEarned) {
                    content = `
                        <span class="badge-icon">${badge.icon}</span>
                        <span class="badge-name">${badge.name}</span>
                        <span class="earned-check">✅</span>
                    `;
                } else if (isPending) {
                    content = `
                        <span class="badge-icon">⏳</span>
                        <span class="badge-name">${badge.name}</span>
                        <span style="font-size:8px;color:var(--orange);">pending</span>
                    `;
                } else {
                    content = `
                        <span class="lock-icon">🔒</span>
                        <span class="badge-name">${badge.name}</span>
                        <span class="coming-soon">locked</span>
                    `;
                }

                const categoryLabel = categories[badge.category]?.label || badge.category;

                html += `
                    <div class="${slotClass}" 
                         data-badge-id="${badge.id}"
                         data-badge-name="${badge.name}"
                         data-badge-category="${categoryLabel}"
                         data-badge-status="${status}"
                         data-badge-icon="${badge.icon}"
                         onmouseenter="showTooltip(event, '${badge.name}', '${categoryLabel}', '${status}')"
                         onmouseleave="hideTooltip()">
                        ${content}
                    </div>
                `;
            }

            // ─── Fill remaining slots with empty slots ──────────
            const totalSlots = 25;
            const currentSlots = badges.length;
            for (let i = currentSlots; i < totalSlots; i++) {
                html += `
                    <div class="inventory-slot empty">
                        <span class="empty-icon">·</span>
                    </div>
                `;
            }

            grid.innerHTML = html;

            // ─── Update stats ──────────────────────────────────
            const progress = Math.round((earnedCount / totalBadges) * 100);
            const level = Math.floor(earnedCount / 5) + 1;

            document.getElementById('badge-count').textContent = earnedCount;
            document.getElementById('level-display').textContent = level;
            document.getElementById('earned-label').textContent = earnedCount;
            document.getElementById('total-label').textContent = totalBadges;
            document.getElementById('slot-count').textContent = `${earnedCount} / ${totalSlots} slots`;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').textContent = progress + '%';

            // ─── Update title ──────────────────────────────────
            const rankEmojis = ['⚜️', '⭐', '🌟', '🏅', '👑'];
            const rankIndex = Math.min(Math.floor(level / 3), rankEmojis.length - 1);
            document.getElementById('rank-display').textContent = rankEmojis[rankIndex] || '⚜️';
            document.getElementById('scout-title').textContent = `⭐ Level ${level} Scout · ${earnedCount} badges`;

            // ─── Click handler ──────────────────────────────────
            document.querySelectorAll('.inventory-slot.earned, .inventory-slot.pending').forEach(slot => {
                slot.addEventListener('click', function() {
                    const name = this.dataset.badgeName;
                    const status = this.dataset.badgeStatus;
                    const icon = this.dataset.badgeIcon;
                    alert(`${icon} ${name}\nStatus: ${status.toUpperCase()}`);
                });
            });
        }

        // ─── TOOLTIP ────────────────────────────────────────────
        window.showTooltip = function(event, name, category, status) {
            const tooltip = document.getElementById('tooltip');
            const statusMap = {
                'earned': '✅ Earned',
                'pending': '⏳ Pending',
                'locked': '🔒 Locked'
            };

            document.getElementById('tooltip-name').textContent = name;
            document.getElementById('tooltip-category').textContent = category;
            const statusEl = document.getElementById('tooltip-status');
            statusEl.textContent = statusMap[status] || status;
            statusEl.className = 'tooltip-status ' + status;

            tooltip.classList.add('visible');
            tooltip.style.left = (event.clientX + 12) + 'px';
            tooltip.style.top = (event.clientY - 10) + 'px';
        };

        window.hideTooltip = function() {
            document.getElementById('tooltip').classList.remove('visible');
        };

        // ─── INIT ──────────────────────────────────────────────
        renderInventory();
    </script>

</body>
