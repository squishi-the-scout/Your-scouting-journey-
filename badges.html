<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge Pouch 🎒</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <h1>✅ Badge Page Loaded</h1>

    <div id="pouchGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:400px;margin:20px auto;"></div>

    <script type="module">
        console.log('Script loaded');

        // ─── Get user ──────────────────────────────────────────────
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        console.log('currentUser:', currentUser);

        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // ─── Badge data ────────────────────────────────────────────
        const badges = [
            { id: 0, name: 'Campfire', icon: '🌲', unlocked: false },
            { id: 1, name: 'Tent Pitcher', icon: '⛺', unlocked: false },
            { id: 2, name: 'Stitcher', icon: '🧵', unlocked: false },
            { id: 3, name: 'Firestarter', icon: '🔥', unlocked: false },
            { id: 4, name: 'Navigator', icon: '🗺️', unlocked: false },
            { id: 5, name: 'Knot Master', icon: '🪢', unlocked: false },
            { id: 6, name: 'Chef', icon: '🍳', unlocked: false },
            { id: 7, name: 'National', icon: '🇿🇦', unlocked: false },
            { id: 8, name: 'World Scout', icon: '🌍', unlocked: false },
            { id: 9, name: 'Global Friend', icon: '🤝', unlocked: false },
        ];

        let badgeState = JSON.parse(localStorage.getItem('badgePouch')) || badges;

        function renderGrid() {
            const grid = document.getElementById('pouchGrid');
            grid.innerHTML = '';

            badgeState.forEach((badge) => {
                const slot = document.createElement('div');
                slot.style.cssText = `
                    aspect-ratio: 1 / 1;
                    background: #6B4F3A;
                    border: 2px solid #5A3F2B;
                    border-radius: 10px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    font-size: 28px;
                    cursor: pointer;
                    padding: 4px;
                    color: white;
                `;
                slot.innerHTML = `
                    <span>${badge.icon}</span>
                    <span style="font-size:10px;color:#D4B896;">${badge.name}</span>
                `;

                slot.addEventListener('click', () => {
                    if (badge.unlocked) {
                        alert(`🎉 You already earned "${badge.name}"!`);
                    } else {
                        alert(`🎫 Request ticket for "${badge.name}"?`);
                    }
                });

                grid.appendChild(slot);
            });

            localStorage.setItem('badgePouch', JSON.stringify(badgeState));
        }

        renderGrid();
        console.log('Grid rendered');
    </script>

</body>
</html>
