<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Progress — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== SCOUT DASHBOARD — PURPLE & ORANGE THEME ===== */
        :root {
            --purple: #6c3b8c;
            --purple-light: #8a5aa8;
            --purple-dark: #4a2a5e;
            --orange: #e67e22;
            --orange-light: #f39c12;
            --orange-dark: #d35400;
            --lavender-bg: #f3edf7;
            --card-bg: #ffffff;
            --text-dark: #2d2a3a;
            --text-muted: #6b5f7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--lavender-bg);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 220px;
            background: var(--purple-dark);
            color: #e8e0f0;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: white;
        }
        .sidebar-brand span {
            color: var(--orange-light);
        }

        .sidebar-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* ─── Person Icon Avatar (clickable) ─── */
        .person-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--orange);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            margin-bottom: 8px;
            border: 2px solid var(--orange-light);
            transition: transform 0.2s;
        }
        .person-avatar:hover {
            transform: scale(1.05);
        }
        .person-avatar .head {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 12px;
        }
        .person-avatar .body {
            width: 28px;
            height: 16px;
            border-radius: 50% 50% 0 0;
            background: white;
            position: absolute;
            bottom: 10px;
        }

        .sidebar-name {
            font-size: 16px;
            font-weight: 600;
            color: #e8e0f0;
        }
        .sidebar-role {
            font-size: 12px;
            color: var(--orange-light);
            margin-top: 2px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sidebar-nav a {
            color: #c4b8d4;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .sidebar-nav a.active {
            background: var(--purple);
            color: white;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-footer a {
            color: #c4b8d4;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-footer a:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 32px 40px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .header-left h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--purple-dark);
            margin: 0;
        }
        .header-left p {
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 4px;
        }

        /* ===== HEADER AVATAR (clickable) ===== */
        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            border: 2px solid var(--orange-light);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .header-avatar:hover {
            transform: scale(1.08);
        }
        .header-avatar .head {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 8px;
        }
        .header-avatar .body {
            width: 20px;
            height: 12px;
            border-radius: 50% 50% 0 0;
            background: white;
            position: absolute;
            bottom: 7px;
        }

        /* ===== PLACEHOLDER ===== */
        .placeholder-heart {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
            font-size: 120px;
            opacity: 0.3;
            color: var(--purple-light);
        }

        /* ===== STATS CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
        }
        .stat-card .label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
        }
        .stat-card.purple .number { color: var(--purple); }
        .stat-card.orange .number { color: var(--orange); }
        .stat-card.green .number { color: #8fbcbb; }

        /* ===== PROGRESS BAR ===== */
        .progress-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 12px;
        }
        .progress-bar-bg {
            background: #e8e0f0;
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, var(--purple), var(--orange));
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.6s ease;
        }

        /* ===== REQUIREMENTS GRID ===== */
        .requirements-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .req-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.2s;
            border-left: 4px solid var(--purple-light);
        }
        .req-card.completed {
            border-left-color: var(--purple);
        }
        .req-card.pending {
            border-left-color: var(--orange);
        }

        .req-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .req-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-dark);
        }
        .req-status-icon {
            font-size: 24px;
        }

        .req-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .req-actions .notes-link {
            background: #f0ebf5;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: var(--purple);
            text-decoration: none;
        }
        .req-actions .notes-link:hover {
            background: #e0d6ec;
        }

        .ready-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ready-btn:hover {
            background: var(--orange-dark);
        }

        .pending-badge {
            background: #fde8d0;
            color: var(--orange-dark);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .pending-badge:hover {
            background: #f5d4b8;
        }
        .approved-badge {
            background: #e8dff0;
            color: var(--purple);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
        }

        /* ===== CONFETTI ===== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confetti-fall 3s ease-in forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .requirements-grid { grid-template-columns: 1fr; }
            .header-left h1 { font-size: 22px; }
            .bottom-nav { display: flex !important; }
        }
    </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="sidebar-brand">🏕️ <span>GIS</span> Scouts</div>

    <div class="sidebar-profile" id="sidebar-profile-btn">
        <div class="person-avatar" id="sidebar-avatar">
            <div class="head"></div>
            <div class="body"></div>
        </div>
        <div class="sidebar-name" id="sidebar-name">Scout</div>
        <div class="sidebar-role" id="sidebar-rank">Scout · Membership</div>
    </div>

    <nav class="sidebar-nav">
        <a href="#" class="active" data-view="dashboard">📊 <span>Dashboard</span></a>
        <a href="#" data-view="membership">🏅 <span>Membership</span></a>
        <a href="#" data-view="second">⭐ <span>Second Class</span></a>
        <a href="#" data-view="first">🌟 <span>First Class</span></a>
        <a href="#" data-view="badges">🏆 <span>Badges</span></a>
        <a href="#" data-view="sessions">📋 <span>My Sessions</span></a>
    </nav>

    <div class="sidebar-footer">
        <a href="#" id="logout-btn">🚪 <span>Logout</span></a>
    </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content" id="main-content">

    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <h1>Good morning, <span id="scout-name">Scout</span>! 👋</h1>
            <p id="scout-subtitle">welcome back</p>
        </div>
        <div class="header-right">
            <div class="header-avatar" id="header-avatar" style="background:var(--orange);">
                <div class="head"></div>
                <div class="body"></div>
            </div>
        </div>
    </div>

    <!-- ===== DYNAMIC CONTENT ===== -->
    <div id="page-content"></div>

</div>

<!-- ===== BOTTOM NAV (mobile) ===== -->
<div class="bottom-nav" style="display:none; position:fixed; bottom:0; left:0; right:0; background:var(--purple-dark); padding:10px 0; justify-content:space-around; z-index:1000; border-top:1px solid rgba(255,255,255,0.1);">
    <a href="#" class="active" data-view="dashboard" style="color:#c4b8d4; font-size:18px; display:flex; flex-direction:column; align-items:center; gap:2px;"><span>📊</span><span style="font-size:9px;">Home</span></a>
    <a href="#" data-view="membership" style="color:#c4b8d4; font-size:18px; display:flex; flex-direction:column; align-items:center; gap:2px;"><span>🏅</span><span style="font-size:9px;">Membership</span></a>
    <a href="#" data-view="second" style="color:#c4b8d4; font-size:18px; display:flex; flex-direction:column; align-items:center; gap:2px;"><span>⭐</span><span style="font-size:9px;">Second</span></a>
    <a href="#" data-view="first" style="color:#c4b8d4; font-size:18px; display:flex; flex-direction:column; align-items:center; gap:2px;"><span>🌟</span><span style="font-size:9px;">First</span></a>
    <a href="#" data-view="sessions" style="color:#c4b8d4; font-size:18px; display:flex; flex-direction:column; align-items:center; gap:2px;"><span>📋</span><span style="font-size:9px;">Sessions</span></a>
</div>

<script type="module" src="scout-dashboard.js"></script>
</body>
</html>
