<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Progress — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌸 Welcome, <span id="scout-name">Scout</span>!</h1>
        <p class="subtitle">Your Scouting Journey</p>

        <button id="logout-btn" class="button logout-btn">Logout</button>

        <div class="tab-bar">
            <button class="tab active" data-tab="membership">🏕️ Membership</button>
            <button class="tab" data-tab="second">⭐ Second Class</button>
            <button class="tab" data-tab="first">🌟 First Class</button>
            <button class="tab" data-tab="badges">🏅 Badges</button>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>Progress</span>
                <span id="progress-count">0/0 completed</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>

        <div id="requirements-list" class="requirements-list">
            Loading...
        </div>
    </div>

    <script type="module" src="scout-dashboard.js"></script>
</body>
</html>
