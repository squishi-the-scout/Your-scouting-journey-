<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — GIS Scouting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #d8f0e5 0%, #c4e0f9 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header card */
        .header-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        h1 {
            color: #2d5a4a;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #7a9e8a;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .logout-btn {
            background: #e8f0ec;
            color: #2d5a4a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #d4e4dc;
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: #7a9e8a;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .tab.active {
            background: #2d5a4a;
            color: white;
            box-shadow: 0 4px 12px rgba(45,90,74,0.2);
        }

        /* Progress card */
        .progress-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: #2d5a4a;
            font-weight: 500;
        }

        .progress-bar-container {
            background: #e8f0ec;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }

        .progress-bar {
            background: #8fbcbb;
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        /* Requirements card */
        .requirements-card {
            background: white;
            border-radius: 28px;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #edf3ef;
            flex-wrap: wrap;
        }

        .requirement-item:last-child {
            border-bottom: none;
        }

        .req-icon {
            font-size: 28px;
            min-width: 44px;
            text-align: center;
        }

        .req-name {
            flex: 1;
            font-weight: 500;
            color: #2d5a4a;
            font-size: 15px;
        }

        .req-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .notes-btn {
            background: none;
            border: 1px solid #cde0d6;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            color: #5a7c6e;
            text-decoration: none;
            transition: all 0.2s;
        }

        .notes-btn:hover {
            background: #e8f0ec;
            border-color: #8fbcbb;
        }

        .mark-ready-btn {
            background: #8fbcbb;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .mark-ready-btn:hover {
            background: #7da8a7;
        }

        .pending-badge {
            background: #f0e0c0;
            color: #8a6e3a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }

        .approved-badge {
            background: #d4e4dc;
            color: #2d5a4a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .header-card { padding: 24px; }
            .requirement-item { flex-direction: column; align-items: flex-start; }
            .req-actions { align-self: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <h1>🌸 Welcome, <span id="scout-name">Scout</span>!</h1>
            <div class="subtitle">Your Scouting Journey — GIS Scouts</div>
            <button id="logout-btn" class="logout-btn">Log out</button>
        </div>

        <div class="tab-bar">
            <button class="tab active" data-tab="membership">🏕️ Membership</button>
            <button class="tab" data-tab="second">⭐ Second Class</button>
            <button class="tab" data-tab="first">🌟 First Class</button>
            <button class="tab" data-tab="badges">🏅 Badges</button>
        </div>

        <div class="progress-card" id="progress-section">
            <div class="progress-label">
                <span>Progress</span>
                <span id="progress-count">0/0 completed</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>

        <div class="requirements-card" id="requirements-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDskMiIM-XQX1oGAxpJT4Se9w-dTBZ1AZs",
            authDomain: "gis-scout-tracker.firebaseapp.com",
            projectId: "gis-scout-tracker",
            storageBucket: "gis-scout-tracker.firebasestorage.app",
            messagingSenderId: "592952880381",
            appId: "1:592952880381:web:be5989bc062b7b26cb6294"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'scout') window.location.href = 'index.html';
        document.getElementById('scout-name').innerText = currentUser.username;

        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };

        const requirementsData = {
            membership: [
                "Law and Promise",
                "Scout Uniform, Badges and Positions",
                "Knots and Whipping",
                "Woodcraft Signs",
                "National Flag, Anthem, Emblem, Tree, Flower",
                "Scouting History",
                "Salutes, Signs, Handshake, Scout Staff",
                "Dress a Wound",
                "Whistle Calls, Silent Signs, Formations",
                "Re-test Membership",
                "Interview by Scouter",
                "Investiture"
            ],
            second: ["Second Class requirements coming soon"],
            first: ["First Class requirements coming soon"],
            badges: ["Proficiency badges coming soon"]
        };

        let currentTab = 'membership';
        let scoutStatus = {};

        async function loadStatus() {
            const docRef = doc(db, 'scoutStatus', currentUser.uid);
            const docSnap = await getDoc(docRef);
            scoutStatus = docSnap.exists() ? docSnap.data() : {};
        }

        async function saveStatus() {
            await setDoc(doc(db, 'scoutStatus', currentUser.uid), scoutStatus);
        }

        function getIcon(status) {
            if (status === 'approved') return '🟢';
            if (status === 'pending') return '✋';
            return '⭕';
        }

        function updateProgress() {
            const reqs = requirementsData[currentTab];
            if (!reqs || reqs.length === 0 || reqs[0].includes("coming soon")) {
                document.getElementById('progress-count').innerText = `0/0 completed`;
                document.getElementById('progress-bar').style.width = '0%';
                return;
            }
            let completed = 0;
            reqs.forEach(req => {
                if (scoutStatus[`${currentTab}_${req}`] === 'approved') completed++;
            });
            const percent = (completed / reqs.length) * 100;
            document.getElementById('progress-count').innerText = `${completed}/${reqs.length} completed`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        async function markAsReady(reqName) {
            const key = `${currentTab}_${reqName}`;
            if (scoutStatus[key] === 'approved') return;
            scoutStatus[key] = 'pending';
            await saveStatus();
            renderRequirements();
        }

        function renderRequirements() {
            const container = document.getElementById('requirements-list');
            const reqs = requirementsData[currentTab];
            
            if (!reqs || reqs.length === 0 || reqs[0].includes("coming soon")) {
                container.innerHTML = `
                    <div class="requirement-item">
                        <span class="req-icon">📅</span>
                        <span class="req-name">More requirements coming soon!</span>
                    </div>
                `;
                updateProgress();
                return;
            }

            container.innerHTML = reqs.map(req => {
                const status = scoutStatus[`${currentTab}_${req}`] || 'todo';
                const icon = getIcon(status);
                let actionHtml = '';
                
                if (status === 'todo') {
                    actionHtml = `<button class="mark-ready-btn" data-req="${req}">Ready</button>`;
                } else if (status === 'pending') {
                    actionHtml = `<span class="pending-badge">Waiting</span>`;
                } else if (status === 'approved') {
                    actionHtml = `<span class="approved-badge">✓ Done</span>`;
                }
                
                return `
                    <div class="requirement-item">
                        <span class="req-icon">${icon}</span>
                        <span class="req-name">${req}</span>
                        <div class="req-actions">
                            <a href="requirement-detail.html?name=${encodeURIComponent(req)}&tab=${currentTab}" class="notes-btn">📖 Notes</a>
                            ${actionHtml}
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.mark-ready-btn').forEach(btn => {
                btn.addEventListener('click', () => markAsReady(btn.dataset.req));
            });
            
            updateProgress();
        }

        async function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                if (t.dataset.tab === tab) t.classList.add('active');
                else t.classList.remove('active');
            });
            await loadStatus();
            renderRequirements();
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        async function init() {
            await loadStatus();
            renderRequirements();
        }
        init();
    </script>
</body>
</html>
