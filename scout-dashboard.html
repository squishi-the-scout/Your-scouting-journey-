<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Progress — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-card">
            <h1>🌸 Welcome, <span id="scout-name">Scout</span></h1>
            <div class="subtitle">Your Scouting Journey</div>
            <button id="logout-btn" class="logout-btn">Log out</button>
        </div>

        <div class="tab-bar">
            <button class="tab active" data-tab="membership">🏕️ Membership</button>
            <button class="tab" data-tab="second">⭐ Second Class</button>
            <button class="tab" data-tab="first">🌟 First Class</button>
            <button class="tab" data-tab="badges">🏅 Badges</button>
        </div>

        <div class="progress-card">
            <div class="progress-header">
                <span>📊 Progress</span>
                <span id="progress-count">0/12</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>

        <div id="requirements-grid" class="requirements-grid"></div>
    </div>

    <script type="module" src="scout-dashboard.js"></script>
</body>
</html>
