<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Detail — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: #2d5a4a; margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #e0ece4; border-radius: 16px;
            font-family: inherit; font-size: 14px; background: white;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-actions { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
        .form-actions button { padding: 10px 24px; border-radius: 40px; border: none; font-weight: 500; cursor: pointer; }
        .btn-save { background: #8fbcbb; color: white; }
        .btn-delete { background: #c47a7a; color: white; }
        .btn-cancel { background: #e8f0ec; color: #2d5a4a; }
        .attendance-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .attendance-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: #f9fbfa; border-radius: 12px;
            flex-wrap: wrap; gap: 8px;
        }
        .attendance-row .scout-name { font-weight: 500; color: #2d5a4a; }
        .attendance-toggle { display: flex; gap: 8px; flex-wrap: wrap; }
        .attendance-toggle button {
            padding: 4px 16px; border-radius: 30px; border: none; font-size: 13px;
            cursor: pointer; font-weight: 500;
            transition: all 0.2s;
        }
        .btn-attend { background: #e8f0ec; color: #5a7c6e; }
        .btn-attend.active { background: #2d5a4a; color: white; }
        .btn-absent { background: #e8f0ec; color: #5a7c6e; }
        .btn-absent.active { background: #c47a7a; color: white; }
        .edit-toggle { background: #a8c4d4; color: #2d5a4a; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 500; cursor: pointer; }
        .edit-toggle:hover { background: #8fb8cc; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .section-title h3 { color: #2d5a4a; margin: 0; }
        .mark-btn-scouts { background: #8fbcbb; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 500; cursor: pointer; }
        .mark-btn-leaders { background: #a8c4d4; color: #2d5a4a; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 500; cursor: pointer; }
        .mark-btn-scouts:hover { background: #7da8a7; }
        .mark-btn-leaders:hover { background: #8fb8cc; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">🏕️ <span>GIS</span> Scouts</div>
        <nav class="sidebar-nav">
            <a href="leader-dashboard.html">📊 <span>Dashboard</span></a>
            <a href="leader-dashboard.html">👥 <span>All Scouts</span></a>
            <a href="leader-dashboard.html">✋ <span>Pending</span></a>
            <a href="sessions.html" class="active">📋 <span>Sessions</span></a>
            <a href="leader-dashboard.html">📤 <span>Export</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logout-btn">🚪 <span>Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <a href="sessions.html" style="color:#5a7c6e;font-weight:500;cursor:pointer;display:inline-block;margin-bottom:8px;">← Back to Sessions</a>
                <h1 id="session-title" style="font-size:28px;font-weight:700;color:#2d5a4a;">Loading...</h1>
                <p id="session-meta" style="color:#5a7c6e;margin-top:4px;"></p>
            </div>
            <div class="header-right">
                <span class="avatar" id="leader-avatar">H</span>
            </div>
        </div>

        <div id="session-detail"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            doc, getDoc, updateDoc, deleteDoc, collection, getDocs, 
            query, where, setDoc 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'leader') window.location.href = 'index.html';
        document.getElementById('leader-avatar').textContent = currentUser.username.charAt(0).toUpperCase();

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        if (!sessionId) window.location.href = 'sessions.html';

        let allScouts = [];
        let allLeaders = [];

        async function loadUsers() {
            const snapshot = await getDocs(collection(db, 'users'));
            allScouts = [];
            allLeaders = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.role === 'scout') allScouts.push({ id: doc.id, username: data.username });
                else if (data.role === 'leader') allLeaders.push({ id: doc.id, username: data.username });
            });
        }

        async function getAttendance() {
            const q = query(collection(db, 'attendance'), where('sessionId', '==', sessionId));
            const snapshot = await getDocs(q);
            const attendance = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                attendance[data.userId] = data.attended;
            });
            return attendance;
        }

        async function renderPage() {
            const docRef = doc(db, 'sessions', sessionId);
            const docSnap = await getDoc(docRef);
            if (!docSnap.exists()) {
                document.getElementById('session-title').textContent = 'Session not found';
                return;
            }
            const session = { id: docSnap.id, ...docSnap.data() };
            const attendance = await getAttendance();

            document.getElementById('session-title').textContent = session.name;
            document.getElementById('session-meta').textContent = `${session.date} · ${session.time} · 📍 ${session.location || 'TBD'}`;

            let attendedScouts = 0;
            allScouts.forEach(s => { if (attendance[s.id] === true) attendedScouts++; });
            let attendedLeaders = 0;
            allLeaders.forEach(s => { if (attendance[s.id] === true) attendedLeaders++; });

            let html = `
                <div style="background:white;border-radius:20px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                        <div>
                            <div style="color:#5a7c6e;font-size:14px;">📝 Purpose</div>
                            <div style="color:#2d5a4a;">${session.purpose || 'No purpose specified'}</div>
                            <div style="color:#b0c4b8;font-size:12px;margin-top:8px;">
                                Created by ${session.createdBy || 'unknown'}
                                ${session.lastEditedBy && session.lastEditedBy !== session.createdBy ? `· Last edited by ${session.lastEditedBy}` : ''}
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="edit-toggle" id="toggle-edit-btn">✏️ Edit</button>
                            <button class="btn-delete" id="delete-session-btn" style="background:#c47a7a;color:white;border:none;padding:8px 20px;border-radius:40px;font-weight:500;cursor:pointer;">🗑️ Delete</button>
                        </div>
                    </div>
                </div>

                <div style="background:white;border-radius:20px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:16px;">
                    <div class="section-title">
                        <h3>👥 Scouts (${attendedScouts}/${allScouts.length} attended)</h3>
                        <button class="mark-btn-scouts" id="mark-all-scouts">✅ Mark All Attended</button>
                    </div>
                    <div class="attendance-grid" id="attendance-scouts">
                        ${allScouts.map(scout => {
                            const isAttended = attendance[scout.id] === true;
                            return `
                                <div class="attendance-row" data-id="${scout.id}" data-type="scout">
                                    <span class="scout-name">${scout.username}</span>
                                    <div class="attendance-toggle">
                                        <button class="btn-attend ${isAttended ? 'active' : ''}" data-attend="true">✅ Attend</button>
                                        <button class="btn-absent ${!isAttended ? 'active' : ''}" data-attend="false">❌ Absent</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div style="background:white;border-radius:20px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:16px;">
                    <div class="section-title">
                        <h3>👤 Leaders (${attendedLeaders}/${allLeaders.length} attended)</h3>
                        <button class="mark-btn-leaders" id="mark-all-leaders">✅ Mark All Attended</button>
                    </div>
                    <div class="attendance-grid" id="attendance-leaders">
                        ${allLeaders.map(leader => {
                            const isAttended = attendance[leader.id] === true;
                            return `
                                <div class="attendance-row" data-id="${leader.id}" data-type="leader">
                                    <span class="scout-name">${leader.username}</span>
                                    <div class="attendance-toggle">
                                        <button class="btn-attend ${isAttended ? 'active' : ''}" data-attend="true">✅ Attend</button>
                                        <button class="btn-absent ${!isAttended ? 'active' : ''}" data-attend="false">❌ Absent</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div id="edit-section" style="display:none;background:white;border-radius:20px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-top:16px;">
                    <h3 style="color:#2d5a4a;margin-bottom:16px;">✏️ Edit Session</h3>
                    <div class="form-group">
                        <label>Session Name</label>
                        <input type="text" id="edit-name" value="${session.name}">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="edit-date" value="${session.date}">
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="edit-time" value="${session.time}">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="edit-location" value="${session.location || ''}">
                    </div>
                    <div class="form-group">
                        <label>Purpose / Notes</label>
                        <textarea id="edit-purpose">${session.purpose || ''}</textarea>
                    </div>
                    <div class="form-actions">
                        <button class="btn-save" id="save-edit-btn">💾 Save Changes</button>
                        <button class="btn-cancel" id="cancel-edit-btn">Cancel</button>
                    </div>
                    <div id="edit-message" style="margin-top:12px;color:#5a7c6e;"></div>
                </div>
            `;

            document.getElementById('session-detail').innerHTML = html;
            attachEvents(session);
        }

        function attachEvents(session) {
            // ─── ATTENDANCE TOGGLE ───
            document.querySelectorAll('#attendance-scouts .attendance-toggle button, #attendance-leaders .attendance-toggle button').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const row = this.closest('.attendance-row');
                    const userId = row.dataset.id;
                    const userType = row.dataset.type;
                    const attend = this.dataset.attend === 'true';
                    const docId = `${sessionId}_${userId}`;
                    
                    await setDoc(doc(db, 'attendance', docId), {
                        sessionId: sessionId,
                        userId: userId,
                        userType: userType,
                        attended: attend
                    });
                    
                    await renderPage();
                });
            });

            // ─── MARK ALL SCOUTS ───
            document.getElementById('mark-all-scouts')?.addEventListener('click', async () => {
                for (const scout of allScouts) {
                    const docId = `${sessionId}_${scout.id}`;
                    await setDoc(doc(db, 'attendance', docId), {
                        sessionId: sessionId,
                        userId: scout.id,
                        userType: 'scout',
                        attended: true
                    });
                }
                await renderPage();
            });

            // ─── MARK ALL LEADERS ───
            document.getElementById('mark-all-leaders')?.addEventListener('click', async () => {
                for (const leader of allLeaders) {
                    const docId = `${sessionId}_${leader.id}`;
                    await setDoc(doc(db, 'attendance', docId), {
                        sessionId: sessionId,
                        userId: leader.id,
                        userType: 'leader',
                        attended: true
                    });
                }
                await renderPage();
            });

            // ─── DELETE ───
            document.getElementById('delete-session-btn')?.addEventListener('click', async () => {
                if (confirm(`Delete "${session.name}"? This cannot be undone.`)) {
                    const q = query(collection(db, 'attendance'), where('sessionId', '==', sessionId));
                    const snapshot = await getDocs(q);
                    for (const doc of snapshot.docs) {
                        await deleteDoc(doc.ref);
                    }
                    await deleteDoc(doc(db, 'sessions', sessionId));
                    window.location.href = 'sessions.html';
                }
            });

            // ─── EDIT TOGGLE ───
            let editVisible = false;
            document.getElementById('toggle-edit-btn')?.addEventListener('click', () => {
                editVisible = !editVisible;
                document.getElementById('edit-section').style.display = editVisible ? 'block' : 'none';
            });

            document.getElementById('cancel-edit-btn')?.addEventListener('click', () => {
                document.getElementById('edit-section').style.display = 'none';
                editVisible = false;
            });

            // ─── SAVE EDIT ─── FIXED ───
            document.getElementById('save-edit-btn')?.addEventListener('click', async () => {
                const name = document.getElementById('edit-name').value.trim();
                const date = document.getElementById('edit-date').value;
                const time = document.getElementById('edit-time').value;
                const location = document.getElementById('edit-location').value.trim();
                const purpose = document.getElementById('edit-purpose').value.trim();
                const msg = document.getElementById('edit-message');

                if (!name || !date || !time) {
                    msg.textContent = '⚠️ Name, Date, and Time are required.';
                    msg.style.color = '#c47a7a';
                    return;
                }

                try {
                    await updateDoc(doc(db, 'sessions', sessionId), {
                        name: name,
                        date: date,
                        time: time,
                        location: location || 'TBD',
                        purpose: purpose || '',
                        lastEditedBy: currentUser.username,
                        lastEditedAt: new Date().toISOString()
                    });
                    
                    msg.textContent = '✅ Session updated!';
                    msg.style.color = '#8fbcbb';
                    document.getElementById('edit-section').style.display = 'none';
                    editVisible = false;
                    
                    // Wait a moment then reload
                    setTimeout(async () => {
                        await renderPage();
                    }, 500);
                    
                } catch (error) {
                    msg.textContent = '❌ Error: ' + error.message;
                    msg.style.color = '#c47a7a';
                    console.error("Edit error:", error);
                }
            });
        }

        async function init() {
            await loadUsers();
            await renderPage();
        }
        init();
    </script>
</body>
</html>
