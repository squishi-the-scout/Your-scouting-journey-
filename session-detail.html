<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Detail — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: #2d5a4a; margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #e0ece4; border-radius: 16px;
            font-family: inherit; font-size: 14px; background: white;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-actions { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
        .form-actions button { padding: 10px 24px; border-radius: 40px; border: none; font-weight: 500; cursor: pointer; }
        .btn-save { background: #8fbcbb; color: white; }
        .btn-delete { background: #c47a7a; color: white; }
        .btn-cancel { background: #e8f0ec; color: #2d5a4a; }
        .attendance-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .attendance-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: #f9fbfa; border-radius: 12px;
            flex-wrap: wrap; gap: 8px;
        }
        .attendance-row .scout-name { font-weight: 500; color: #2d5a4a; }
        .attendance-toggle { display: flex; gap: 8px; flex-wrap: wrap; }
        .attendance-toggle button {
            padding: 4px 16px; border-radius: 30px; border: none; font-size: 13px;
            cursor: pointer; font-weight: 500;
            transition: all 0.2s;
        }
        .btn-attend { background: #e8f0ec; color: #5a7c6e; }
        .btn-attend.active { background: #2d5a4a; color: white; }
        .btn-absent { background: #e8f0ec; color: #5a7c6e; }
        .btn-absent.active { background: #c47a7a; color: white; }
        .edit-toggle { background: #a8c4d4; color: #2d5a4a; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 500; cursor: pointer; }
        .edit-toggle:hover { background: #8fb8cc; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .section-title h3 { color: #2d5a4a; margin: 0; }
        .mark-btn-scouts { background: #8fbcbb; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 500; cursor: pointer; }
        .mark-btn-leaders { background: #a8c4d4; color: #2d5a4a; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 500; cursor: pointer; }
        .mark-btn-scouts:hover { background: #7da8a7; }
        .mark-btn-leaders:hover { background: #8fb8cc; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">🏕️ <span>GIS</span> Scouts</div>

        <div class="sidebar-profile">
            <div class="person-avatar" id="sidebar-avatar">
                <div class="head"></div>
                <div class="body"></div>
            </div>
            <div class="sidebar-name" id="sidebar-name">Hazfar</div>
            <div class="sidebar-role">HOPE — Rover Leader</div>
        </div>

        <nav class="sidebar-nav">
            <a href="leader-dashboard.html" data-view="dashboard">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span>Dashboard</span>
            </a>
            <a href="leader-dashboard.html" data-view="scouts">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                <span>All Scouts</span>
            </a>
            <a href="leader-dashboard.html" data-view="pending">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span>Pending</span> <span class="badge" id="pending-badge">0</span>
            </a>
            <a href="#" class="active" data-view="sessions">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                <span>Sessions</span>
            </a>
            <a href="leader-dashboard.html" data-view="export">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                <span>Export</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" id="logout-btn">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <a href="sessions.html" style="color:#5a7c6e;font-weight:500;cursor:pointer;display:inline-block;margin-bottom:8px;">← Back to Sessions</a>
<h1 id="session-title" style="font-size:28px;font-weight:700;color:#2d5a4a;">Loading...</h1>
                <p id="session-meta" style="color:#5a7c6e;margin-top:4px;"></p>
            </div>
            <div class="header-right">
                <span class="avatar" id="leader-avatar">H</span>
            </div>
        </div>

        <div id="session-detail"></div>
    </div>

    <script type="module" src="session-detail.js"></script>
</body>
</html>
