<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Detail — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-section {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }
        .detail-section h3 {
            color: var(--text-dark);
            margin-bottom: 16px;
        }
        .attendance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f0f8;
        }
        .attendance-item:last-child {
            border-bottom: none;
        }
        .attendance-item .name {
            font-weight: 500;
        }
        .attendance-item .status {
            font-size: 13px;
            padding: 2px 12px;
            border-radius: 12px;
        }
        .attendance-item .status.present {
            background: #d4edda;
            color: #155724;
        }
        .attendance-item .status.absent {
            background: #f8d7da;
            color: #721c24;
        }
        .toggle-btn {
            padding: 4px 14px;
            border-radius: 20px;
            border: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.present {
            background: #28a745;
            color: white;
        }
        .toggle-btn.present:hover {
            background: #218838;
        }
        .toggle-btn.absent {
            background: #dc3545;
            color: white;
        }
        .toggle-btn.absent:hover {
            background: #c82333;
        }
        .btn-primary {
            background: var(--purple);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: var(--purple-dark);
        }
        .feedback-item {
            background: #f8f5fa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .feedback-item .scout-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--purple-dark);
        }
        .feedback-item .feedback-text {
            font-size: 14px;
            color: var(--text-dark);
            margin-top: 4px;
        }
        .leader-notes-area {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0d6ec;
            font-family: inherit;
            font-size: 14px;
            min-height: 80px;
            resize: vertical;
        }
        .scout-feedback-area {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0d6ec;
            font-family: inherit;
            font-size: 14px;
            min-height: 60px;
            resize: vertical;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .meta-item {
            display: flex;
            flex-direction: column;
        }
        .meta-item .label {
            font-size: 12px;
            color: var(--text-muted);
        }
        .meta-item .value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #8baa9a;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .back-link:hover {
            color: var(--purple-dark);
        }
        .mark-all-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .mark-all-btn:hover {
            background: #218838;
        }
        @media (max-width: 768px) {
            .meta-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width:800px;margin:0 auto;padding:32px 20px;">
        <span class="back-link" id="back-link">← Back to Sessions</span>

        <div id="session-detail">
            <div style="text-align:center;padding:40px 0;">
                <div style="font-size:48px;margin-bottom:16px;">⏳</div>
                <p style="color:var(--text-muted);">Loading session details...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            doc, getDoc, setDoc, updateDoc, collection, getDocs, onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        if (!sessionId) {
            document.getElementById('session-detail').innerHTML = `<p style="color:#e74c3c;">No session ID provided.</p>`;
        }

        const isLeader = currentUser.role === 'leader';
        const userEmail = `${currentUser.username}@gis-scout.local`;
        const container = document.getElementById('session-detail');

        let allScouts = [];

        // ─── FIXED BACK BUTTON ──────────────────────────────────
        document.getElementById('back-link').addEventListener('click', function() {
            if (isLeader) {
                window.location.href = 'leader-dashboard.html#sessions';
            } else {
                window.location.href = 'scout-dashboard.html#sessions';
            }
        });

        async function loadScouts() {
            const snap = await getDocs(collection(db, 'users'));
            allScouts = [];
            snap.forEach(doc => {
                const data = doc.data();
                if (data.role === 'scout') {
                    allScouts.push({ email: doc.id, ...data });
                }
            });
        }

        function renderSession(session) {
            const isAttending = session.attendance ? session.attendance[userEmail] === true : false;
            const attendeeCount = session.attendance ? Object.keys(session.attendance).filter(k => session.attendance[k] === true).length : 0;
            const totalScouts = allScouts.length;
            const attendancePercent = totalScouts > 0 ? Math.round((attendeeCount / totalScouts) * 100) : 0;

            let html = `
                <div class="detail-section">
                    <h2 style="color:var(--purple-dark);margin:0 0 8px 0;">${session.name}</h2>
                    <div class="meta-grid">
                        <div class="meta-item"><span class="label">📅 Date</span><span class="value">${session.date}</span></div>
                        <div class="meta-item"><span class="label">⏰ Time</span><span class="value">${session.time}</span></div>
                        <div class="meta-item"><span class="label">📍 Location</span><span class="value">${session.location || 'TBD'}</span></div>
                        <div class="meta-item"><span class="label">⏱️ Duration</span><span class="value">${session.duration || 0} hours</span></div>
                    </div>
                    ${session.purpose ? `<p style="margin-top:16px;color:var(--text-dark);">📝 ${session.purpose}</p>` : ''}
                    <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;">
                        <span style="background:#e8e0f0;padding:4px 14px;border-radius:20px;font-size:13px;color:var(--text-muted);">👥 ${attendeeCount} attendees</span>
                        <span style="background:#e8e0f0;padding:4px 14px;border-radius:20px;font-size:13px;color:var(--text-muted);">📊 ${attendancePercent}% attendance</span>
                        ${isAttending ? '<span style="background:#d4edda;color:#155724;padding:4px 14px;border-radius:20px;font-size:13px;">✅ You attended</span>' : ''}
                    </div>
                </div>
            `;

            if (isLeader) {
                html += `
                    <div class="detail-section">
                        <h3>📝 Leader Notes</h3>
                        <textarea id="leader-notes" class="leader-notes-area">${session.leaderNotes || ''}</textarea>
                        <button id="save-leader-notes" class="btn-primary" style="margin-top:12px;">💾 Save Notes</button>
                        <div id="leader-notes-message" style="margin-top:8px;font-size:13px;color:var(--text-muted);"></div>
                    </div>
                `;
            }

            if (isLeader) {
                html += `
                    <div class="detail-section">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
                            <h3 style="margin:0;">👥 Attendance (${totalScouts} scouts)</h3>
                            <button class="mark-all-btn" id="mark-all-present">✅ Mark All Present</button>
                        </div>
                        <div id="attendance-list">
                            ${allScouts.map(scout => {
                                const present = session.attendance ? session.attendance[scout.email] === true : false;
                                return `
                                    <div class="attendance-item">
                                        <span class="name">${scout.fullName || scout.username}</span>
                                        <div style="display:flex;align-items:center;gap:8px;">
                                            <span class="status ${present ? 'present' : 'absent'}">${present ? '✅ Present' : '❌ Absent'}</span>
                                            <button class="toggle-btn ${present ? 'present' : 'absent'}" data-email="${scout.email}">${present ? 'Mark Absent' : 'Mark Present'}</button>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div id="attendance-message" style="margin-top:12px;font-size:13px;color:var(--text-muted);"></div>
                    </div>
                `;
            }

            html += `
                <div class="detail-section">
                    <h3>💬 Scout Feedback</h3>
                    ${isLeader ? `
                        ${Object.keys(session.scoutNotes || {}).length === 0 ? '<p style="color:var(--text-muted);">No feedback submitted yet.</p>' : ''}
                        ${Object.entries(session.scoutNotes || {}).map(([email, note]) => {
                            const scout = allScouts.find(s => s.email === email);
                            const name = scout ? scout.fullName || scout.username : email;
                            return `
                                <div class="feedback-item">
                                    <div class="scout-name">${name}</div>
                                    <div class="feedback-text">${note}</div>
                                </div>
                            `;
                        }).join('')}
                    ` : `
                        <div style="margin-bottom:12px;">
                            <label style="font-weight:500;display:block;margin-bottom:6px;">Your Feedback</label>
                            <textarea id="scout-feedback" class="scout-feedback-area" placeholder="What did you learn? Any suggestions?">${session.scoutNotes ? session.scoutNotes[userEmail] || '' : ''}</textarea>
                            <button id="submit-feedback" class="btn-primary" style="margin-top:12px;">📤 Submit Feedback</button>
                            <div id="feedback-message" style="margin-top:8px;font-size:13px;color:var(--text-muted);"></div>
                        </div>
                        ${Object.keys(session.scoutNotes || {}).length > 1 ? `
                            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #e8e0f0;">
                                <div style="font-weight:500;margin-bottom:8px;">Other Scouts Said:</div>
                                ${Object.entries(session.scoutNotes || {}).filter(([email]) => email !== userEmail).map(([email, note]) => {
                                    const scout = allScouts.find(s => s.email === email);
                                    const name = scout ? scout.fullName || scout.username : email;
                                    return `
                                        <div class="feedback-item">
                                            <div class="scout-name">${name}</div>
                                            <div class="feedback-text">${note}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : ''}
                    `}
                </div>
            `;

            container.innerHTML = html;

            if (isLeader) {
                document.getElementById('save-leader-notes')?.addEventListener('click', async function() {
                    const notes = document.getElementById('leader-notes').value.trim();
                    try {
                        await updateDoc(doc(db, 'sessions', sessionId), {
                            leaderNotes: notes,
                            lastEditedBy: currentUser.username,
                            lastEditedAt: new Date().toISOString()
                        });
                        document.getElementById('leader-notes-message').textContent = '✅ Notes saved!';
                        document.getElementById('leader-notes-message').style.color = '#4caf50';
                    } catch (error) {
                        document.getElementById('leader-notes-message').textContent = '❌ Error: ' + error.message;
                        document.getElementById('leader-notes-message').style.color = '#e74c3c';
                    }
                });
            }

            document.getElementById('mark-all-present')?.addEventListener('click', async function() {
                try {
                    const docRef = doc(db, 'sessions', sessionId);
                    const docSnap = await getDoc(docRef);
                    const data = docSnap.data();
                    const attendance = data.attendance || {};
                    for (const scout of allScouts) {
                        attendance[scout.email] = true;
                    }
                    await updateDoc(docRef, { attendance });
                    document.getElementById('attendance-message').textContent = '✅ All scouts marked present!';
                    document.getElementById('attendance-message').style.color = '#4caf50';
                } catch (error) {
                    document.getElementById('attendance-message').textContent = '❌ Error: ' + error.message;
                    document.getElementById('attendance-message').style.color = '#e74c3c';
                }
            });

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const email = this.dataset.email;
                    const currentPresent = this.textContent === 'Mark Absent';
                    const newStatus = !currentPresent;

                    try {
                        const docRef = doc(db, 'sessions', sessionId);
                        const docSnap = await getDoc(docRef);
                        const data = docSnap.data();
                        const attendance = data.attendance || {};
                        attendance[email] = newStatus;
                        await updateDoc(docRef, { attendance });
                        document.getElementById('attendance-message').textContent = `✅ ${email} marked ${newStatus ? 'present' : 'absent'}`;
                        document.getElementById('attendance-message').style.color = '#4caf50';
                    } catch (error) {
                        document.getElementById('attendance-message').textContent = '❌ Error: ' + error.message;
                        document.getElementById('attendance-message').style.color = '#e74c3c';
                    }
                });
            });

            if (!isLeader) {
                document.getElementById('submit-feedback')?.addEventListener('click', async function() {
                    const feedback = document.getElementById('scout-feedback').value.trim();
                    if (!feedback) {
                        document.getElementById('feedback-message').textContent = '⚠️ Please write something.';
                        document.getElementById('feedback-message').style.color = '#e67e22';
                        return;
                    }

                    try {
                        const docRef = doc(db, 'sessions', sessionId);
                        const docSnap = await getDoc(docRef);
                        const data = docSnap.data();
                        const scoutNotes = data.scoutNotes || {};
                        scoutNotes[userEmail] = feedback;
                        await updateDoc(docRef, { scoutNotes });
                        document.getElementById('feedback-message').textContent = '✅ Feedback submitted!';
                        document.getElementById('feedback-message').style.color = '#4caf50';
                    } catch (error) {
                        document.getElementById('feedback-message').textContent = '❌ Error: ' + error.message;
                        document.getElementById('feedback-message').style.color = '#e74c3c';
                    }
                });
            }
        }

        async function init() {
            await loadScouts();

            onSnapshot(doc(db, 'sessions', sessionId), (docSnap) => {
                if (!docSnap.exists()) {
                    container.innerHTML = `<p style="color:#e74c3c;">Session not found.</p>`;
                    return;
                }
                renderSession({ id: docSnap.id, ...docSnap.data() });
            }, (error) => {
                console.error('Session listener error:', error);
                container.innerHTML = `<p style="color:#e74c3c;">Error loading session: ${error.message}</p>`;
            });
        }

        init();
    </script>
</body>
</html>
