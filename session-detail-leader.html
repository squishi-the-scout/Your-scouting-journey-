<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Detail — Leader</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ─── Base ─── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f7f0;
            color: #1b3a1b;
            padding: 32px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ─── Back Link ─── */
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #1b5e20;
        }

        /* ─── Cards ─── */
        .detail-section {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .detail-section h3 {
            color: #1b3a1b;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* ─── Meta Grid ─── */
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-item .label {
            font-size: 12px;
            color: #5a7a5a;
        }

        .meta-item .value {
            font-size: 16px;
            font-weight: 500;
            color: #1b3a1b;
        }

        /* ─── Attendance ─── */
        .attendance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f5f0;
        }
        .attendance-item:last-child {
            border-bottom: none;
        }

        .attendance-item .name {
            font-weight: 500;
            font-size: 14px;
        }

        .attendance-item .status {
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 12px;
            font-weight: 500;
        }

        .attendance-item .status.present {
            background: #d4edda;
            color: #155724;
        }

        .attendance-item .status.absent {
            background: #f8d7da;
            color: #721c24;
        }

        .toggle-btn {
            padding: 4px 14px;
            border-radius: 20px;
            border: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.present {
            background: #28a745;
            color: white;
        }
        .toggle-btn.present:hover {
            background: #218838;
        }

        .toggle-btn.absent {
            background: #dc3545;
            color: white;
        }
        .toggle-btn.absent:hover {
            background: #c82333;
        }

        /* ─── Buttons ─── */
        .btn-primary {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #1b5e20;
        }

        .mark-all-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mark-all-btn:hover {
            background: #218838;
        }

        /* ─── Feedback ─── */
        .feedback-item {
            background: #f5f8f5;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .feedback-item .scout-name {
            font-weight: 600;
            font-size: 14px;
            color: #1b5e20;
        }

        .feedback-item .feedback-text {
            font-size: 14px;
            color: #1b3a1b;
            margin-top: 4px;
        }

        .leader-notes-area {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #dce8dc;
            font-family: inherit;
            font-size: 14px;
            min-height: 80px;
            resize: vertical;
            background: #fafcfa;
        }

        .leader-notes-area:focus {
            outline: 2px solid #2e7d32;
            border-color: transparent;
        }

        .badge-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .badge-group .badge {
            background: #e8f0e8;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #1b3a1b;
        }

        .badge-group .badge.green {
            background: #d4edda;
            color: #155724;
        }

        .badge-group .badge.gold {
            background: #fff3cd;
            color: #856404;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .mt-8 {
            margin-top: 8px;
        }

        .mt-12 {
            margin-top: 12px;
        }

        .text-muted {
            color: #5a7a5a;
        }

        /* ─── Mobile ─── */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            .meta-grid {
                grid-template-columns: 1fr;
            }
            .detail-section {
                padding: 18px;
            }
            .flex-between {
                flex-direction: column;
                align-items: stretch;
            }
            .mark-all-btn {
                width: 100%;
                text-align: center;
            }
            .attendance-item {
                flex-wrap: wrap;
                gap: 6px;
            }
            .attendance-item .name {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="back-link" id="back-link">← Back to Sessions</span>

        <div id="session-detail">
            <div style="text-align:center;padding:60px 20px;">
                <div style="font-size:48px;margin-bottom:16px;">⏳</div>
                <p class="text-muted">Loading session details...</p>
            </div>
        </div>
    </div>

    <script type="module">
        // ─── IMPORTS ──────────────────────────────────────────
        import { db } from './firebase-config.js';
        import {
            doc, getDoc, setDoc, updateDoc, collection, getDocs, onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ─── USER ─────────────────────────────────────────────
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        const isLeader = currentUser.role === 'leader' || 
                         ['Rover Leader', 'GSL', 'AGSL', 'Advisor', 'Section Head'].includes(currentUser.role);

        if (!isLeader) {
            window.location.href = 'scout-dashboard.html';
        }

        // ─── URL ──────────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        if (!sessionId) {
            document.getElementById('session-detail').innerHTML = `
                <div style="background:white;border-radius:24px;padding:40px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <p style="color:#e74c3c;">No session ID provided.</p>
                </div>
            `;
        }

        const container = document.getElementById('session-detail');
        let allScouts = [];

        // ─── BACK BUTTON ──────────────────────────────────────
        document.getElementById('back-link').addEventListener('click', function() {
            window.location.href = 'leader-dashboard.html#sessions';
        });

        // ─── LOAD SCOUTS ─────────────────────────────────────
        async function loadScouts() {
            const snap = await getDocs(collection(db, 'users'));
            allScouts = [];
            snap.forEach(doc => {
                const data = doc.data();
                if (data.role === 'scout') {
                    allScouts.push({ email: doc.id, ...data });
                }
            });
        }

        // ─── RENDER ──────────────────────────────────────────
        function renderSession(session) {
            const attendeeCount = session.attendance ? Object.keys(session.attendance).filter(k => session.attendance[k] === true).length : 0;
            const totalScouts = allScouts.length;
            const attendancePercent = totalScouts > 0 ? Math.round((attendeeCount / totalScouts) * 100) : 0;

            let html = `
                <!-- ─── SESSION INFO ─── -->
                <div class="detail-section">
                    <h2 style="color:#1b3a1b;margin:0 0 8px 0;font-size:22px;">${session.name}</h2>
                    <div class="meta-grid">
                        <div class="meta-item">
                            <span class="label">📅 Date</span>
                            <span class="value">${session.date}</span>
                        </div>
                        <div class="meta-item">
                            <span class="label">⏰ Time</span>
                            <span class="value">${session.time}</span>
                        </div>
                        <div class="meta-item">
                            <span class="label">📍 Location</span>
                            <span class="value">${session.location || 'TBD'}</span>
                        </div>
                        <div class="meta-item">
                            <span class="label">⏱️ Duration</span>
                            <span class="value">${session.duration || 0} hours</span>
                        </div>
                    </div>

                    ${session.purpose ? `<p style="margin-top:16px;color:#1b3a1b;">📝 ${session.purpose}</p>` : ''}

                    <div class="badge-group">
                        <span class="badge">👥 ${attendeeCount} attendees</span>
                        <span class="badge ${attendancePercent > 70 ? 'green' : 'gold'}">📊 ${attendancePercent}% attendance</span>
                    </div>
                </div>

                <!-- ─── LEADER NOTES ─── -->
                <div class="detail-section">
                    <h3>📝 Leader Notes</h3>
                    <textarea id="leader-notes" class="leader-notes-area">${session.leaderNotes || ''}</textarea>
                    <button id="save-leader-notes" class="btn-primary" style="margin-top:12px;">💾 Save Notes</button>
                    <div id="leader-notes-message" class="text-muted" style="margin-top:8px;font-size:13px;"></div>
                </div>

                <!-- ─── ATTENDANCE ─── -->
                <div class="detail-section">
                    <div class="flex-between" style="margin-bottom:16px;">
                        <h3 style="margin:0;">👥 Attendance (${totalScouts} scouts)</h3>
                        <button class="mark-all-btn" id="mark-all-present">✅ Mark All Present</button>
                    </div>

                    <div id="attendance-list">
                        ${allScouts.map(scout => {
                            const present = session.attendance ? session.attendance[scout.email] === true : false;
                            return `
                                <div class="attendance-item">
                                    <span class="name">${scout.fullName || scout.username}</span>
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <span class="status ${present ? 'present' : 'absent'}">${present ? '✅ Present' : '❌ Absent'}</span>
                                        <button class="toggle-btn ${present ? 'present' : 'absent'}" data-email="${scout.email}">${present ? 'Mark Absent' : 'Mark Present'}</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div id="attendance-message" class="text-muted" style="margin-top:12px;font-size:13px;"></div>
                </div>

                <!-- ─── SCOUT FEEDBACK ─── -->
                <div class="detail-section">
                    <h3>💬 Scout Feedback</h3>
                    ${Object.keys(session.scoutNotes || {}).length === 0 ? '<p class="text-muted">No feedback submitted yet.</p>' : ''}
                    ${Object.entries(session.scoutNotes || {}).map(([email, note]) => {
                        const scout = allScouts.find(s => s.email === email);
                        const name = scout ? scout.fullName || scout.username : email;
                        return `
                            <div class="feedback-item">
                                <div class="scout-name">${name}</div>
                                <div class="feedback-text">${note}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            container.innerHTML = html;

            // ─── SAVE LEADER NOTES ────────────────────────────
            document.getElementById('save-leader-notes')?.addEventListener('click', async function() {
                const notes = document.getElementById('leader-notes').value.trim();
                const msg = document.getElementById('leader-notes-message');
                try {
                    await updateDoc(doc(db, 'sessions', sessionId), {
                        leaderNotes: notes,
                        lastEditedBy: currentUser.username,
                        lastEditedAt: new Date().toISOString()
                    });
                    msg.textContent = '✅ Notes saved!';
                    msg.style.color = '#28a745';
                } catch (error) {
                    msg.textContent = '❌ Error: ' + error.message;
                    msg.style.color = '#e74c3c';
                }
            });

            // ─── MARK ALL PRESENT ─────────────────────────────
            document.getElementById('mark-all-present')?.addEventListener('click', async function() {
                try {
                    const docRef = doc(db, 'sessions', sessionId);
                    const docSnap = await getDoc(docRef);
                    const data = docSnap.data();
                    const attendance = data.attendance || {};
                    for (const scout of allScouts) {
                        attendance[scout.email] = true;
                    }
                    await updateDoc(docRef, { attendance });
                    document.getElementById('attendance-message').textContent = '✅ All scouts marked present!';
                    document.getElementById('attendance-message').style.color = '#28a745';
                } catch (error) {
                    document.getElementById('attendance-message').textContent = '❌ Error: ' + error.message;
                    document.getElementById('attendance-message').style.color = '#e74c3c';
                }
            });

            // ─── TOGGLE ATTENDANCE ────────────────────────────
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const email = this.dataset.email;
                    const currentPresent = this.textContent === 'Mark Absent';
                    const newStatus = !currentPresent;

                    try {
                        const docRef = doc(db, 'sessions', sessionId);
                        const docSnap = await getDoc(docRef);
                        const data = docSnap.data();
                        const attendance = data.attendance || {};
                        attendance[email] = newStatus;
                        await updateDoc(docRef, { attendance });
                        document.getElementById('attendance-message').textContent = `✅ ${email} marked ${newStatus ? 'present' : 'absent'}`;
                        document.getElementById('attendance-message').style.color = '#28a745';
                    } catch (error) {
                        document.getElementById('attendance-message').textContent = '❌ Error: ' + error.message;
                        document.getElementById('attendance-message').style.color = '#e74c3c';
                    }
                });
            });
        }

        // ─── INIT ─────────────────────────────────────────────
        async function init() {
            await loadScouts();

            onSnapshot(doc(db, 'sessions', sessionId), (docSnap) => {
                if (!docSnap.exists()) {
                    container.innerHTML = `
                        <div style="background:white;border-radius:24px;padding:40px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                            <p style="color:#e74c3c;">Session not found.</p>
                        </div>
                    `;
                    return;
                }
                renderSession({ id: docSnap.id, ...docSnap.data() });
            }, (error) => {
                console.error('Session listener error:', error);
                container.innerHTML = `
                    <div style="background:white;border-radius:24px;padding:40px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                        <p style="color:#e74c3c;">Error loading session: ${error.message}</p>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
