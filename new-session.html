<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e0d6ec;
            font-size: 15px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }
        .form-group input[type="date"]::-webkit-calendar-picker-indicator,
        .form-group input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
            cursor: text;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn-primary {
            background: var(--purple);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary:hover {
            background: var(--purple-dark);
        }
        .btn-secondary {
            background: #e8e0f0;
            color: var(--text-dark);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-secondary:hover {
            background: #d5cae0;
        }
        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .button-row {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width:700px;margin:0 auto;padding:32px 20px;">
        <div class="header-card">
            <a href="leader-dashboard.html" data-view="sessions" class="back-link" id="back-link">← Back to Sessions</a>
            <h1 style="color:var(--purple-dark);margin:16px 0 8px 0;">📅 Create New Session</h1>
            <p style="color:var(--text-muted);">Fill in the details for your scout session.</p>
        </div>

        <form id="session-form" style="background:white;border-radius:24px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
            <div class="form-group">
                <label for="session-name">Session Title *</label>
                <input type="text" id="session-name" placeholder="e.g., Knots Practice" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="session-date">Date *</label>
                    <input type="date" id="session-date" required>
                </div>
                <div class="form-group">
                    <label for="session-time">Time *</label>
                    <input type="time" id="session-time" required>
                </div>
            </div>

            <div class="form-group">
                <label for="session-location">Location</label>
                <input type="text" id="session-location" placeholder="e.g., School Hall, Beach, Park">
            </div>

            <div class="form-group">
                <label for="session-purpose">Purpose / Description</label>
                <textarea id="session-purpose" placeholder="What will the scouts learn/do?"></textarea>
            </div>

            <div class="form-group">
                <label for="session-duration">Duration (hours) *</label>
                <input type="number" id="session-duration" placeholder="e.g., 2" min="0.5" step="0.5" required>
            </div>

            <div class="form-group">
                <label for="session-leader-notes">Leader Notes (optional)</label>
                <textarea id="session-leader-notes" placeholder="Any notes for this session..."></textarea>
            </div>

            <div class="button-row">
                <a href="leader-dashboard.html" data-view="sessions" class="btn-secondary" id="cancel-btn">Cancel</a>
                <button type="submit" class="btn-primary">💾 Save</button>
            </div>
        </form>

        <div id="message" style="margin-top:16px;text-align:center;font-weight:500;"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'leader') {
            window.location.href = 'index.html';
        }

        document.getElementById('session-date').value = new Date().toISOString().split('T')[0];

        const form = document.getElementById('session-form');
        const message = document.getElementById('message');

        // Fix navigation for back links
        document.querySelectorAll('#back-link, #cancel-btn').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'leader-dashboard.html#sessions';
            });
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('session-name').value.trim();
            const date = document.getElementById('session-date').value;
            const time = document.getElementById('session-time').value;
            const location = document.getElementById('session-location').value.trim();
            const purpose = document.getElementById('session-purpose').value.trim();
            const duration = parseFloat(document.getElementById('session-duration').value);
            const leaderNotes = document.getElementById('session-leader-notes').value.trim();

            if (!name || !date || !time || !duration) {
                message.textContent = '❌ Please fill in all required fields.';
                message.style.color = '#e74c3c';
                return;
            }

            try {
                await addDoc(collection(db, 'sessions'), {
                    name,
                    date,
                    time,
                    location: location || 'TBD',
                    purpose: purpose || '',
                    duration,
                    leaderNotes: leaderNotes || '',
                    createdBy: currentUser.username,
                    createdAt: serverTimestamp(),
                    lastEditedBy: currentUser.username,
                    lastEditedAt: serverTimestamp(),
                    attendance: {},
                    scoutNotes: {}
                });

                message.textContent = '✅ Session created successfully! Redirecting...';
                message.style.color = '#4caf50';
                setTimeout(() => {
                    window.location.href = 'leader-dashboard.html#sessions';
                }, 1500);
            } catch (error) {
                message.textContent = '❌ Error: ' + error.message;
                message.style.color = '#e74c3c';
            }
        });
    </script>
</body>
</html>
