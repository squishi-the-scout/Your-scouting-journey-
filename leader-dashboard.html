<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #d8f0e5 0%, #c4e0f9 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #2d5a4a; font-size: 28px; margin-bottom: 12px; }
        .subtitle { color: #5a7c6e; margin-bottom: 32px; border-bottom: 2px solid #e0f0e8; padding-bottom: 16px; }
        .logout-btn { background: #8fbcbb; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-bottom: 30px; }
        .info-card { background: #f9fbfa; padding: 24px; border-radius: 24px; text-align: center; }
        .info-card h2 { color: #2d5a4a; margin-bottom: 16px; }
        .info-card p { color: #5a7c6e; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Leader Dashboard</h1>
        <div class="subtitle">Manage scouts and approve progress</div>
        <button id="logout-btn" class="logout-btn">Logout</button>
        <div class="info-card">
            <h2>📋 Scout Management</h2>
            <p>Welcome, <strong id="leader-name">Leader</strong>.</p>
            <p>✅ List of scouts and progress coming soon.</p>
            <p>🖊️ Approval system coming soon.</p>
        </div>
    </div>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'leader') window.location.href = 'index.html';
        document.getElementById('leader-name').innerText = currentUser.username;
        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
