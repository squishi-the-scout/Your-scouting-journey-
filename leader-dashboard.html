<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-card">
            <h1>👋 Leader Dashboard</h1>
            <div class="subtitle">Manage scout progress</div>
            <button id="logout-btn" class="logout-btn">Log out</button>
        </div>
        <div id="scouts-list" class="requirements-grid">Loading scouts...</div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'leader') window.location.href = 'index.html';

        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };

        // Must match EXACTLY what scout uses (membership_ + requirement name)
        const membershipReqs = [
            "Law and Promise",
            "Scout Uniform, Badges and Positions",
            "Knots and Whipping",
            "Woodcraft Signs",
            "National Flag, Anthem, Emblem, Tree, Flower",
            "Scouting History",
            "Salutes, Signs, Handshake, Scout Staff",
            "Dress a Wound",
            "Whistle Calls, Silent Signs, Formations",
            "Re-test Membership",
            "Interview by Scouter",
            "Investiture"
        ];

        async function loadScouts() {
            const usersSnapshot = await getDocs(collection(db, 'users'));
            const scouts = [];
            usersSnapshot.forEach(doc => {
                const data = doc.data();
                if (data.role === 'scout') {
                    scouts.push({ id: doc.id, username: data.username });
                }
            });
            return scouts;
        }

        async function render() {
            const scouts = await loadScouts();
            const container = document.getElementById('scouts-list');
            
            if (scouts.length === 0) {
                container.innerHTML = '<div class="req-card"><div class="req-name">No scouts found.</div></div>';
                return;
            }

            container.innerHTML = '';
            
            for (const scout of scouts) {
                const statusDoc = await getDoc(doc(db, 'scoutStatus', scout.id));
                const status = statusDoc.exists() ? statusDoc.data() : {};
                
                const pending = [];
                for (const req of membershipReqs) {
                    const key = `membership_${req}`;
                    if (status[key] === 'pending') {
                        pending.push(req);
                    }
                }
                
                const card = document.createElement('div');
                card.className = 'req-card';
                
                let html = `<div class="req-name">📋 ${scout.username}</div>`;
                
                if (pending.length === 0) {
                    html += '<div class="req-footer" style="margin-top: 12px;"><span class="done-text">✅ No pending approvals</span></div>';
                } else {
                    pending.forEach(req => {
                        html += `
                            <div class="req-footer" style="margin-top: 12px; justify-content: space-between; display: flex; align-items: center;">
                                <span>✋ ${req}</span>
                                <button class="ready-btn" data-scout="${scout.id}" data-req="${req}" style="background: #8fbcbb; border: none; padding: 6px 16px; border-radius: 30px; color: white; cursor: pointer;">Approve</button>
                            </div>
                        `;
                    });
                }
                
                card.innerHTML = html;
                container.appendChild(card);
            }
            
            document.querySelectorAll('.ready-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const scoutId = btn.dataset.scout;
                    const reqName = btn.dataset.req;
                    const statusRef = doc(db, 'scoutStatus', scoutId);
                    const current = (await getDoc(statusRef)).data() || {};
                    current[`membership_${reqName}`] = 'approved';
                    await setDoc(statusRef, current);
                    render();
                });
            });
        }
        
        render();
    </script>
</body>
</html>
