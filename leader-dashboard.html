<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Dashboard — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== LEADER DASHBOARD — GREEN THEME ===== */
        :root {
            --green-primary: #2e7d32;
            --green-primary-dark: #1b5e20;
            --green-primary-light: #4caf50;
            --green-secondary: #81c784;
            --green-secondary-light: #a5d6a7;
            --green-background: #f0f7f0;
            --green-mint: #e8f5e9;
            --gold: #f9a825;
            --gold-light: #ffd54f;
            --text-dark: #1b3a1b;
            --text-muted: #5a7a5a;
            --card-bg: #ffffff;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--green-background);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 220px;
            background: var(--text-dark);
            color: #c8e6c9;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: white;
        }
        .sidebar-brand span {
            color: var(--gold-light);
        }

        .sidebar-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 20px;
            cursor: pointer;
        }

        .person-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--green-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }
        .person-avatar:hover {
            transform: scale(1.05);
        }
        .person-avatar .head {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 12px;
        }
        .person-avatar .body {
            width: 28px;
            height: 16px;
            border-radius: 50% 50% 0 0;
            background: white;
            position: absolute;
            bottom: 10px;
        }

        .sidebar-name {
            font-size: 16px;
            font-weight: 600;
            color: #e8f5e9;
        }
        .sidebar-role {
            font-size: 12px;
            color: var(--green-secondary);
            margin-top: 2px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sidebar-nav a {
            color: #a5d6a7;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-nav a .nav-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }
        .sidebar-nav a.active {
            background: var(--green-primary);
            color: white;
        }

        /* ─── BADGE COUNT (matching style) ─── */
        .badge-count {
            display: none;
            background: #e74c3c;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 50%;
            margin-left: auto;
            min-width: 20px;
            text-align: center;
        }
        .badge-count.visible {
            display: inline-block;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-footer a {
            color: #a5d6a7;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-footer a .nav-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .sidebar-footer a:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 32px 40px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .header-left h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }
        .header-left p {
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 4px;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-dark);
            cursor: pointer;
            padding: 4px 8px;
            z-index: 1001;
        }

        /* ===== STAT CARD ===== */
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
        }
        .stat-card.green .number { color: var(--green-primary); }
        .stat-card.gold .number { color: var(--gold); }
        .stat-card.mint .number { color: var(--green-secondary); }

        /* ===== STAGNATION BANNER ===== */
        .stagnation-banner {
            background: #fff8e1;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border-left: 4px solid var(--gold);
        }
        .stagnation-banner .title {
            font-weight: 600;
            color: #795548;
        }
        .stagnation-banner .subtitle {
            font-size: 12px;
            color: #795548;
        }
        .stagnation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: white;
            border-radius: 8px;
            margin-top: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stagnation-item:hover {
            background: #f5f5f5;
        }
        .stagnation-item .scout-name {
            font-weight: 500;
        }
        .stagnation-item .scout-detail {
            font-size: 13px;
            color: var(--text-muted);
        }
        .stagnation-item .status-badge {
            font-size: 12px;
            font-weight: 600;
        }
        .stagnation-item .status-badge.inactive {
            color: #f39c12;
        }
        .stagnation-item .status-badge.critical {
            color: #e74c3c;
        }

        /* ===== SUCCESS BANNER ===== */
        .success-banner {
            background: #e8f5e9;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 24px;
            border-left: 4px solid var(--green-primary);
            color: var(--text-dark);
        }

        /* ===== SCOUT CARD ===== */
        .scout-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .scout-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .scout-card .name {
            font-weight: 600;
            font-size: 18px;
            color: var(--text-dark);
        }
        .scout-card .role-tag {
            font-size: 12px;
            background: var(--green-mint);
            padding: 2px 10px;
            border-radius: 12px;
            color: var(--text-muted);
        }
        .scout-card .meta {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .scout-card .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }
        .scout-card .progress-bar {
            background: #e8e0f0;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .scout-card .progress-bar .fill {
            background: var(--green-primary);
            height: 100%;
            border-radius: 20px;
        }
        .scout-card .note {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            border-top: 1px solid #e8e0f0;
            padding-top: 8px;
        }

        /* ===== SESSION CARD ===== */
        .session-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid var(--green-primary-light);
        }
        .session-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .session-card .session-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .session-card .session-meta {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .session-card .session-status {
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 12px;
            font-weight: 500;
            color: white;
        }
        .session-card .session-status.today {
            background: var(--green-primary);
        }
        .session-card .session-status.upcoming {
            background: #007bff;
        }
        .session-card .session-status.completed {
            background: #6c757d;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: var(--green-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: var(--green-primary-dark);
        }

        .btn-secondary {
            background: #e8e0f0;
            color: var(--text-dark);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: #d5cae0;
        }

        .btn-new-session {
            background: var(--gold);
            color: var(--text-dark);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(249,168,37,0.3);
        }
        .btn-new-session:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(249,168,37,0.4);
        }

        /* ===== PENDING ITEM ===== */
        .pending-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 4px solid var(--green-primary-light);
        }
        .pending-item .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }
        .pending-item .badge-label {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 8px;
        }
        .pending-item .req-name {
            font-weight: 500;
        }
        .pending-item .scout-name {
            color: var(--text-muted);
            font-size: 14px;
        }

        .approve-btn {
            background: var(--green-primary);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .approve-btn:hover {
            background: var(--green-primary-dark);
        }

        .reject-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .reject-btn:hover {
            background: #c0392b;
        }

        /* ===== COLOR KEY ===== */
        .color-key {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .color-key .key-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            color: white;
        }
        .color-key .key-item.membership { background: #7bcb7b; }
        .color-key .key-item.second { background: #4caf50; }
        .color-key .key-item.first { background: #2e7d32; }
        .color-key .key-item.badges { background: #00897b; }
        .color-key .key-item.promo { background: linear-gradient(135deg, #b8860b, #6b8e23); }

        /* ===== TICKET LIST ITEM ===== */
        .ticket-list-item {
            background: white;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-left: 4px solid #8e44ad;
        }
        .ticket-list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px; padding-bottom: 80px; }
            .bottom-nav { display: flex !important; }
            .header-left h1 { font-size: 22px; }
            .scout-card { padding: 16px; }
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--text-dark);
            padding: 8px 0;
            justify-content: space-around;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .bottom-nav a {
            color: #a5d6a7;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .bottom-nav a.active {
            color: white;
            background: rgba(255,255,255,0.06);
        }
        .bottom-nav a span {
            font-size: 9px;
        }
        .bottom-nav a .nav-icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ===== MOBILE SIDEBAR ===== */
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
        .mobile-overlay.active {
            display: block;
        }

        .mobile-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--text-dark);
            color: #e8f0ec;
            padding: 28px 20px;
            z-index: 1000;
            transition: left 0.3s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .mobile-sidebar.open {
            left: 0;
        }
        .mobile-sidebar .close-btn {
            background: none;
            border: none;
            color: #e8f0ec;
            font-size: 28px;
            cursor: pointer;
            text-align: right;
            margin-bottom: 16px;
            padding: 0;
        }
        .mobile-sidebar .sidebar-brand {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: white;
        }
        .mobile-sidebar .sidebar-brand span {
            color: #a8c4d4;
        }
        .mobile-sidebar .sidebar-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 20px;
            cursor: pointer;
        }
        .mobile-sidebar .person-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #7a9e8a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            margin-bottom: 8px;
        }
        .mobile-sidebar .person-avatar .head {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 12px;
        }
        .mobile-sidebar .person-avatar .body {
            width: 28px;
            height: 16px;
            border-radius: 50% 50% 0 0;
            background: white;
            position: absolute;
            bottom: 10px;
        }
        .mobile-sidebar .sidebar-name {
            font-size: 16px;
            font-weight: 600;
            color: #e8f0ec;
        }
        .mobile-sidebar .sidebar-role {
            font-size: 12px;
            color: #a8c4d4;
            margin-top: 2px;
        }
        .mobile-sidebar .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .mobile-sidebar .sidebar-nav a {
            color: #c4d9ce;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .mobile-sidebar .sidebar-nav a:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .mobile-sidebar .sidebar-nav a.active {
            background: #3d6e5c;
            color: white;
        }
        .mobile-sidebar .sidebar-nav a .nav-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .mobile-sidebar .sidebar-nav a .badge-count {
            margin-left: auto;
        }
        .mobile-sidebar .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .mobile-sidebar .sidebar-footer a {
            color: #c4d9ce;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }
        .mobile-sidebar .sidebar-footer a:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .mobile-sidebar .sidebar-footer a .nav-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
    </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="sidebar-brand">🏕️ <span>GIS</span> Scouts</div>

    <div class="sidebar-profile" id="sidebar-profile-btn">
        <div class="person-avatar" id="sidebar-avatar">
            <div class="head"></div>
            <div class="body"></div>
        </div>
        <div class="sidebar-name" id="sidebar-name">Leader</div>
        <div class="sidebar-role" id="sidebar-role">Leader</div>
    </div>

    <nav class="sidebar-nav">
        <a href="#" class="active" data-view="dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Home</span>
        </a>
        <a href="#" data-view="scouts">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <span>All Scouts</span>
        </a>
        <a href="#" data-view="pending">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>Pending</span>
            <span class="badge-count" id="pending-badge">0</span>
        </a>
        <a href="#" data-view="tickets">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Tickets</span>
            <span class="badge-count" id="leader-ticket-badge">0</span>
        </a>
