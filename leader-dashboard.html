<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Dashboard — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--purple-dark);
            padding: 8px 0;
            justify-content: space-around;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-nav a {
            color: #c4b8d4;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .bottom-nav a.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .bottom-nav a span {
            font-size: 9px;
        }
        .bottom-nav a .badge-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            margin-left: 2px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px; padding-bottom: 80px; }
            .bottom-nav { display: flex !important; }
        }
    </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="sidebar-brand">🏕️ <span>GIS</span> Scouts</div>

    <div class="sidebar-profile">
        <div class="person-avatar" id="sidebar-avatar">
            <div class="head"></div>
            <div class="body"></div>
        </div>
        <div class="sidebar-name" id="sidebar-name">Hazfar</div>
        <div class="sidebar-role">HOPE — Rover Leader</div>
    </div>

    <nav class="sidebar-nav">
        <a href="#" class="active" data-view="dashboard">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            <span>Dashboard</span>
        </a>
        <a href="#" data-view="scouts">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span>All Scouts</span>
        </a>
        <a href="#" data-view="pending">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span>Pending</span> <span class="badge" id="pending-badge">0</span>
        </a>
        <a href="#" data-view="sessions">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            <span>Sessions</span>
        </a>
        <a href="#" data-view="export">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            <span>Export</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="#" id="logout-btn">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            <span>Logout</span>
        </a>
    </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content" id="main-content">
    <div id="page-content"></div>
</div>

<!-- ===== BOTTOM NAV (mobile) ===== -->
<div class="bottom-nav">
    <a href="#" class="active" data-view="dashboard">
        <span>📊</span>
        <span>Home</span>
    </a>
    <a href="#" data-view="scouts">
        <span>👥</span>
        <span>Scouts</span>
    </a>
    <a href="#" data-view="pending">
        <span>⏳</span>
        <span>Pending</span>
    </a>
    <a href="#" data-view="sessions">
        <span>📋</span>
        <span>Sessions</span>
    </a>
    <a href="#" data-view="export">
        <span>📤</span>
        <span>Export</span>
    </a>
</div>

<script type="module" src="leader-dashboard.js"></script>
</body>
</html>
