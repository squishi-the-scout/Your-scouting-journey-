<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Dashboard — GIS Scouts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="sidebar-brand">🏕️ <span>GIS</span> Scouts</div>
    <nav class="sidebar-nav">
        <a href="#" class="active" data-view="dashboard">📊 <span>Dashboard</span></a>
        <a href="#" data-view="scouts">👥 <span>All Scouts</span></a>
        <a href="#" data-view="pending">✋ <span>Pending</span> <span class="badge" id="pending-badge">0</span></a>
        <a href="#" data-view="sessions">📋 <span>Sessions</span></a>
        <a href="#" data-view="export">📤 <span>Export</span></a>
    </nav>
    <div class="sidebar-footer">
        <a href="#" id="logout-btn">🚪 <span>Logout</span></a>
    </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content" id="main-content">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1 id="page-title">📊 Dashboard</h1>
            <p id="page-subtitle">Welcome back, <span id="leader-name">Hazfar</span> 👋</p>
        </div>
        <div class="header-right">
            <span class="avatar" id="leader-avatar">H</span>
        </div>
    </div>

    <!-- Dynamic content goes here -->
    <div id="page-content"></div>

</div>

<script type="module" src="leader-dashboard.js"></script>
</body>
</html>
