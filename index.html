<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Scouts — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #d8f0e5 0%, #c4e0f9 100%);
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .login-card .logo {
            text-align: center;
            font-size: 32px;
            margin-bottom: 12px;
        }

        .login-card h1 {
            color: #2d5a4a;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: #5a7c6e;
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .role-display {
            text-align: center;
            padding: 10px;
            background: #f0f7f4;
            border-radius: 12px;
            color: #5a7c6e;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .role-display strong {
            color: #2d5a4a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #2d5a4a;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8efe8;
            border-radius: 16px;
            font-size: 16px;
            background: #fafcfa;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #8fbcbb;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 52px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: #8a9e96;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .toggle-password:hover {
            background: #f0f4f2;
            color: #2d5a4a;
        }

        .toggle-password svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #8fbcbb;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #7da8a7;
        }

        .login-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .error-message {
            color: #d45a7a;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            min-height: 24px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #8a9e96;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🏕️</div>
        <h1>GIS Scouts</h1>
        <p class="subtitle">Sign in to track your scouting journey</p>

        <form id="login-form">
            <div class="role-display">
                <span>Logging in as: <strong id="role-text">Scout</strong></span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">ID Number (Password)</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your ID number" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            <div id="error-message" class="error-message"></div>
        </form>

        <div class="footer">GIS Scouting Progress Tracker</div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ─── Leader roles ──────────────────────────────────────
        const leader = ['leader', 'Rover Leader', 'GSL', 'AGSL', 'Advisor', 'Section Head'];

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const errorDiv = document.getElementById('error-message');
        const togglePassword = document.getElementById('toggle-password');
        const roleText = document.getElementById('role-text');

        // ─── Auto-check role from Firestore ──────────────────
        let roleCheckTimeout = null;

        usernameInput.addEventListener('input', function() {
            const username = this.value.trim().toLowerCase();
            
            if (!username) {
                roleText.textContent = 'Scout';
                roleText.style.color = '#5a7c6e';
                return;
            }

            roleText.textContent = 'Checking...';
            roleText.style.color = '#8a9e96';

            clearTimeout(roleCheckTimeout);
            roleCheckTimeout = setTimeout(async () => {
                try {
                    const docRef = doc(db, 'users', username);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (leaderRoles.includes(data.role)) {
                            roleText.textContent = 'Leader';
                            roleText.style.color = '#2d5a4a';
                        } else if (data.role === 'scout') {
                            roleText.textContent = 'Scout';
                            roleText.style.color = '#5a7c6e';
                        } else {
                            roleText.textContent = 'Unknown Role';
                            roleText.style.color = '#d45a7a';
                        }
                    } else {
                        roleText.textContent = 'User not found';
                        roleText.style.color = '#d45a7a';
                    }
                } catch (error) {
                    roleText.textContent = 'Error checking';
                    roleText.style.color = '#d45a7a';
                    console.error('Role check error:', error);
                }
            }, 500);
        });

        // ─── Toggle password visibility ────────────────────
        togglePassword.addEventListener('click', function() {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

            this.innerHTML = isPassword ? `
                <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                    <line x1="4" y1="4" x2="20" y2="20"/>
                </svg>
            ` : `
                <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            `;
        });

        // ─── Login ──────────────────────────────────────────
        loginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim().toLowerCase();
            const idNumber = passwordInput.value.trim();
            errorDiv.innerText = '';

            if (!username || !idNumber) {
                errorDiv.innerText = 'Please enter username and ID number';
                return;
            }

            loginBtn.textContent = 'Checking...';
            loginBtn.classList.add('loading');

            try {
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('username', '==', username));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    errorDiv.innerText = 'User not found. Contact your leader.';
                    loginBtn.textContent = 'Sign In';
                    loginBtn.classList.remove('loading');
                    return;
                }

                let userData = null;
                let docId = null;
                querySnapshot.forEach(doc => {
                    userData = doc.data();
                    docId = doc.id;
                });

                if (userData.idNumber !== idNumber) {
                    errorDiv.innerText = 'Invalid ID number. Please try again.';
                    loginBtn.textContent = 'Sign In';
                    loginBtn.classList.remove('loading');
                    return;
                }

                if (!userData.role) {
                    errorDiv.innerText = 'Account not configured. Contact your leader.';
                    loginBtn.textContent = 'Sign In';
                    loginBtn.classList.remove('loading');
                    return;
                }

                localStorage.setItem('currentUser', JSON.stringify({
                    username: username,
                    role: userData.role,
                    fullName: userData.fullName || username,
                    uid: docId
                }));

                if (leaderRoles.includes(userData.role)) {
                    window.location.href = 'leader-dashboard.html';
                } else {
                    window.location.href = 'scout-dashboard.html';
                }

            } catch (error) {
                errorDiv.innerText = 'Login failed: ' + error.message;
                console.error(error);
                loginBtn.textContent = 'Sign In';
                loginBtn.classList.remove('loading');
            }
        });

        // ─── Enter key to login ────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
    </script>
</body>
</html>
