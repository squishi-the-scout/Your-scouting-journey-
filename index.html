<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Scouting Progress Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #d8f0e5 0%, #c4e0f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2d5a4a;
            font-size: 28px;
            margin-bottom: 12px;
            text-align: center;
        }

        .description {
            color: #5a7c6e;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.5;
        }

        label {
            display: block;
            color: #2d5a4a;
            font-weight: 500;
            margin-bottom: 6px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d0e0d8;
            border-radius: 16px;
            font-size: 16px;
            background: #f9fbfa;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #8fbcbb;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #7da8a7;
        }

        .error {
            color: #d45a7a;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Welcome to your Scouting Tracker</h1>
        <div class="description">
            This is an info hub and tracker for your journey through scouting.<br>
            Currently designed for GIS Scouts.
        </div>

        <div id="login-section">
            <label>Role</label>
            <select id="role-select">
                <option value="scout">Scout</option>
                <option value="leader">Leader</option>
            </select>

            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">

            <button id="login-btn">Log in</button>
            <div id="error-message" class="error"></div>
        </div>
    </div>

    <script type="module">
        // REPLACE THIS with YOUR firebaseConfig from Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_AUTH_DOMAIN_HERE",
            projectId: "YOUR_PROJECT_ID_HERE",
            storageBucket: "YOUR_STORAGE_BUCKET_HERE",
            messagingSenderId: "YOUR_SENDER_ID_HERE",
            appId: "YOUR_APP_ID_HERE"
        };

        // Import Firebase (using CDN)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login button handler
        document.getElementById('login-btn').addEventListener('click', async () => {
            const role = document.getElementById('role-select').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            if (!username || !password) {
                errorDiv.innerText = 'Please enter username and password';
                return;
            }

            try {
                // Convert username to email format for Firebase
                const email = `${username}@gis-scout.local`;
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Get user role from Firestore
                const userDoc = await getDoc(doc(db, 'users', email));
                const userData = userDoc.data();

                if (!userData) {
                    errorDiv.innerText = 'User not found. Please contact your leader.';
                    return;
                }

                if (role === 'leader' && userData.role !== 'leader') {
                    errorDiv.innerText = 'Not authorized as leader';
                    return;
                }

                if (role === 'scout' && userData.role !== 'scout') {
                    errorDiv.innerText = 'Not authorized as scout';
                    return;
                }

                // Store current user info
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    username: username,
                    role: userData.role
                }));

                // Redirect based on role
                if (userData.role === 'leader') {
                    window.location.href = 'leader-dashboard.html';
                } else {
                    window.location.href = 'scout-dashboard.html';
                }

            } catch (error) {
                errorDiv.innerText = 'Login failed: ' + error.message;
                console.error(error);
            }
        });
    </script>
</body>
</html>
