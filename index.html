<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Scouting Progress Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #d8f0e5 0%, #c4e0f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #2d5a4a; font-size: 28px; margin-bottom: 12px; text-align: center; }
        .description { color: #5a7c6e; text-align: center; margin-bottom: 32px; font-size: 14px; line-height: 1.5; }
        label { display: block; color: #2d5a4a; font-weight: 500; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d0e0d8;
            border-radius: 16px;
            font-size: 16px;
            background: #f9fbfa;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 48px;
            margin-bottom: 0;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #8a9e96;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .toggle-password:hover {
            background: #f0f4f2;
            color: #2d5a4a;
        }
        .password-field {
            margin-bottom: 20px;
        }
        .password-field label {
            margin-bottom: 6px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #8fbcbb;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #7da8a7; }
        .error { color: #d45a7a; text-align: center; margin-top: 16px; font-size: 14px; }
        .role-display {
            text-align: center;
            padding: 8px;
            background: #f0f7f4;
            border-radius: 12px;
            color: #5a7c6e;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .role-display strong {
            color: #2d5a4a;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Welcome to your Scouting Tracker</h1>
        <div class="description">This is an info hub and tracker for your journey through scouting.<br>Currently designed for GIS Scouts.</div>
        <div id="login-section">
            <div class="role-display">
                <span>Logging in as: <strong id="role-display-text">Scout</strong></span>
            </div>
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
            
            <div class="password-field">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">👁️</button>
                </div>
            </div>
            
            <button id="login-btn">Log in</button>
            <div id="error-message" class="error"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const errorDiv = document.getElementById('error-message');
        const togglePassword = document.getElementById('toggle-password');
        const roleDisplay = document.getElementById('role-display-text');

        // ─── Show role based on username ──────────────────────
        usernameInput.addEventListener('input', function() {
            const username = this.value.trim().toLowerCase();
            if (username === 'hazfar' || username === 'iyan') {
                roleDisplay.textContent = 'Leader';
                roleDisplay.style.color = '#2d5a4a';
            } else if (username.length > 0) {
                roleDisplay.textContent = 'Scout';
                roleDisplay.style.color = '#5a7c6e';
            } else {
                roleDisplay.textContent = 'Scout';
                roleDisplay.style.color = '#5a7c6e';
            }
        });

        // ─── Toggle password visibility ──────────────────────
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // ─── Login ────────────────────────────────────────────
        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            errorDiv.innerText = '';

            if (!username || !password) {
                errorDiv.innerText = 'Please enter username and password';
                return;
            }

            try {
                const email = `${username}@gis-scout.local`;
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const userDoc = await getDoc(doc(db, 'users', email));
                
                if (!userDoc.exists()) {
                    errorDiv.innerText = 'User not found. Contact your leader.';
                    return;
                }

                const userData = userDoc.data();

                // ─── Check if user has a role ──────────────────
                if (!userData.role) {
                    errorDiv.innerText = 'Account not configured. Contact your leader.';
                    return;
                }

                // ─── Save to localStorage ──────────────────────
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    username: username,
                    role: userData.role,
                    fullName: userData.fullName || username
                }));

                // ─── Redirect based on role ────────────────────
                if (userData.role === 'leader') {
                    window.location.href = 'leader-dashboard.html';
                } else {
                    window.location.href = 'scout-dashboard.html';
                }

            } catch (error) {
                errorDiv.innerText = 'Login failed: ' + error.message;
                console.error(error);
            }
        });

        // ─── Enter key to login ──────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
    </script>
</body>
</html>
